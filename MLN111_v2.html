{q:`Khái niệm nào dùng để chỉ khoảng giới hạn trong đó sự thay đổi về lượng chưa dẫn đến sự thay đổi căn bản chất của sự vật ấy?`,o:[`A. Chất`,`B. Lượng`,`C. Độ`,`D. Điểm nút`],a:`C`}
        ];

        // ===== STATE =====
        let currentCard = 0, currentQuiz = 0;
        let learned = new Set(), marked = new Set();

        // Test state
        let tQuestions = [], tCurrent = 0, tCorrect = 0, tWrong = 0;
        let tAnswers = []; // {q, opts, correct, chosen, ok}
        let tSelectedLetter = null;
        let tAnswered = false;
        let tNumSel = 10;

        // ===== INIT =====
        document.getElementById('totalQ').innerText = questions.length;
        updateStats(); renderCard(); renderQuiz(); renderList();

        function updateStats() {
            document.getElementById('learnedQ').innerText = learned.size;
            document.getElementById('markedQ').innerText = marked.size;
        }

        function switchView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (id === 'list') renderList();
        }

        // ===== FLASHCARD =====
        function renderCard() {
            const q = questions[currentCard];
            document.getElementById('fcQuestion').innerText = `Câu ${currentCard+1}: ${q.q}`;
            document.getElementById('fcAnswer').innerText = `Đáp án: ${q.a}`;
            document.getElementById('fcOptions').innerHTML = q.o.map(o =>
                `<div style="margin:4px 0;padding:5px 8px;background:#f1f5f9;border-radius:4px;">${o}</div>`).join('');
            document.getElementById('fcProgress').style.width = `${((currentCard+1)/questions.length)*100}%`;
            document.querySelector('.flashcard').classList.remove('flipped');
            const btn = document.getElementById('markBtn');
            if (marked.has(currentCard)) {
                btn.innerText='🚩 Bỏ đánh dấu'; btn.style.background='#fee2e2'; btn.style.color='#dc2626';
            } else {
                btn.innerText='🚩 Đánh dấu'; btn.style.background=''; btn.style.color='';
            }
        }
        function nextCard() { learned.add(currentCard); if(currentCard<questions.length-1){currentCard++;renderCard();updateStats();} }
        function prevCard() { if(currentCard>0){currentCard--;renderCard();} }
        function toggleMark() { if(marked.has(currentCard))marked.delete(currentCard);else marked.add(currentCard);renderCard();updateStats(); }

        // ===== QUIZ =====
        function renderQuiz() {
            const q = questions[currentQuiz];
            document.getElementById('quizQuestion').innerText = `Câu ${currentQuiz+1}: ${q.q}`;
            document.getElementById('quizProgress').style.width = `${((currentQuiz+1)/questions.length)*100}%`;
            const d = document.getElementById('quizOptions');
            d.innerHTML='';
            q.o.forEach((opt,i) => {
                const el = document.createElement('div');
                el.className='option'; el.innerText=opt;
                el.onclick = () => {
                    d.querySelectorAll('.option').forEach(o=>o.classList.add('disabled'));
                    const ok = q.a.includes(opt.charAt(0));
                    if(ok){el.classList.add('correct');learned.add(currentQuiz);updateStats();}
                    else{el.classList.add('wrong');d.querySelectorAll('.option').forEach(o=>{if(q.a.includes(o.innerText.charAt(0)))o.classList.add('correct');});}
                };
                d.appendChild(el);
            });
        }
        function nextQuiz(){if(currentQuiz<questions.length-1){currentQuiz++;renderQuiz();}}
        function prevQuiz(){if(currentQuiz>0){currentQuiz--;renderQuiz();}}

        // ===== LIST =====
        function renderList(filter=''){
            const d=document.getElementById('qList'); d.innerHTML='';
            const f=filter.toLowerCase();
            questions.forEach((q,i)=>{
                if(f&&!q.q.toLowerCase().includes(f)&&!q.o.some(o=>o.toLowerCase().includes(f)))return;
                const el=document.createElement('div'); el.className='q-item';
                el.innerHTML=`<strong>Câu ${i+1}: ${q.q}</strong><div style="margin-left:12px;color:#475569;">${q.o.map(o=>`<div>${o}</div>`).join('')}</div><div class="ans">Đáp án: ${q.a}</div>`;
                d.appendChild(el);
            });
        }
        function filterList(v){renderList(v);}

        // ===== TEST SETUP =====
        function selectNum(btn, n) {
            document.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('sel'));
            btn.classList.add('sel');
            tNumSel = n;
            document.getElementById('customNum').value='';
        }
        function clearPreset(){
            document.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('sel'));
            tNumSel = null;
        }
        function getNumQ(){
            const c = document.getElementById('customNum').value;
            if(c&&parseInt(c)>0) return Math.min(parseInt(c), questions.length);
            return tNumSel || 10;
        }

        function startTest(qs) {
            const n = qs ? qs.length : getNumQ();
            tQuestions = qs || [...questions].sort(()=>0.5-Math.random()).slice(0,n);
            tCurrent=0; tCorrect=0; tWrong=0; tAnswers=[];
            document.getElementById('testSetup').classList.add('hidden');
            document.getElementById('testArea').classList.remove('hidden');
            document.getElementById('testResult').classList.add('hidden');
            renderTestQ();
        }

        function renderTestQ(){
            const q = tQuestions[tCurrent];
            const total = tQuestions.length;
            tSelectedLetter = null;
            tAnswered = false;

            // Topbar
            document.getElementById('topbarText').innerText = `Câu ${tCurrent+1} / ${total}`;
            document.getElementById('tpFill').style.width = `${((tCurrent+1)/total)*100}%`;
            document.getElementById('topbarScore').innerHTML = `✅ ${tCorrect} &nbsp; ❌ ${tWrong}`;

            // Back btn: disable on first question
            document.getElementById('btnBack').disabled = (tCurrent === 0);

            // Next btn label
            const isLast = tCurrent === total-1;
            const nb = document.getElementById('btnNext');
            nb.innerText = isLast ? 'Finish ✓' : 'Next ▶';
            nb.disabled = true; // enable after answering

            // Left: checkboxes
            const letters = q.o.map(o => o.charAt(0));
            document.getElementById('chooseHint').innerText = `(Choose 1 answer)`;
            const cbList = document.getElementById('cbList');
            cbList.innerHTML = '';
            letters.forEach(letter => {
                const row = document.createElement('div');
                row.className = 'cb-row';
                row.dataset.letter = letter;
                row.innerHTML = `<div class="cb-box"></div><span class="cb-letter">${letter}</span>`;
                row.onclick = () => handleCbClick(letter, q);
                cbList.appendChild(row);
            });

            // Right: question + options
            document.getElementById('testQNum').innerText = `Câu ${tCurrent+1} / ${total}`;
            document.getElementById('testQText').innerText = q.q;

            const optsList = document.getElementById('testOptsList');
            optsList.innerHTML = '';
            q.o.forEach(opt => {
                const el = document.createElement('div');
                el.className = 'test-opt-item';
                el.dataset.letter = opt.charAt(0);
                el.innerText = opt;
                el.onclick = () => handleCbClick(opt.charAt(0), q);
                optsList.appendChild(el);
            });

            // Hide feedback
            const fb = document.getElementById('answerFeedback');
            fb.style.display='none'; fb.className='answer-feedback'; fb.innerHTML='';
        }

        function handleCbClick(letter, q) {
            if (tAnswered) return;

            // If clicking same letter, deselect
            if (tSelectedLetter === letter) {
                tSelectedLetter = null;
                updateCbUI(null, null, false);
                document.getElementById('btnNext').disabled = true;
                return;
            }

            tSelectedLetter = letter;
            updateCbUI(letter, null, false);
            document.getElementById('btnNext').disabled = false;
        }

        function updateCbUI(selectedLetter, correctLetter, revealed) {
            // Update checkboxes
            document.querySelectorAll('#cbList .cb-row').forEach(row => {
                const l = row.dataset.letter;
                row.className = 'cb-row';
                if (revealed) {
                    row.classList.add('cb-disabled');
                    if (l === correctLetter) row.classList.add('cb-correct');
                    else if (l === selectedLetter && l !== correctLetter) row.classList.add('cb-wrong');
                } else {
                    if (l === selectedLetter) row.classList.add('cb-selected');
                }
                // update inner checkbox mark
                const box = row.querySelector('.cb-box');
                if (revealed) {
                    if (l === correctLetter) box.innerText = '✓';
                    else if (l === selectedLetter && l !== correctLetter) box.innerText = '✗';
                    else box.innerText = '';
                } else {
                    box.innerText = l === selectedLetter ? '✓' : '';
                }
            });

            // Update right-side options
            document.querySelectorAll('#testOptsList .test-opt-item').forEach(el => {
                const l = el.dataset.letter;
                el.className = 'test-opt-item';
                if (revealed) {
                    el.classList.add('toi-disabled');
                    if (l === correctLetter) el.classList.add('toi-correct');
                    else if (l === selectedLetter && l !== correctLetter) el.classList.add('toi-wrong');
                } else {
                    if (l === selectedLetter) el.classList.add('toi-selected');
                }
            });
        }

        function revealAnswer(q) {
            if (tAnswered) return;
            if (!tSelectedLetter) return;
            tAnswered = true;

            const correctLetter = q.a.trim()[0]; // e.g. 'A'
            const isOk = q.a.includes(tSelectedLetter);

            if (isOk) tCorrect++; else tWrong++;

            // Save record
            const chosenOptText = q.o.find(o => o.charAt(0) === tSelectedLetter) || '';
            const correctOptText = q.o.find(o => q.a.includes(o.charAt(0))) || '';
            tAnswers.push({ q: q.q, opts: q.o, correct: q.a, chosen: tSelectedLetter, ok: isOk, chosenText: chosenOptText, correctText: correctOptText });

            // Update UI to revealed state
            updateCbUI(tSelectedLetter, correctLetter, true);
            document.getElementById('topbarScore').innerHTML = `✅ ${tCorrect} &nbsp; ❌ ${tWrong}`;

            // Feedback box
            const fb = document.getElementById('answerFeedback');
            fb.style.display = 'block';
            if (isOk) {
                fb.className = 'answer-feedback af-correct';
                fb.innerHTML = `<b>✅ Chính xác!</b>Đáp án đúng: <strong>${q.a}</strong> — ${correctOptText}`;
            } else {
                fb.className = 'answer-feedback af-wrong';
                fb.innerHTML = `<b>❌ Chưa đúng!</b>Đáp án đúng: <strong>${q.a}</strong> — ${correctOptText}<br><span style="color:#64748b;font-size:0.9rem;">Bạn đã chọn: ${tSelectedLetter}</span>`;
            }

            document.getElementById('btnNext').disabled = false;
        }

        function testBack() {
            // Go back without re-answering (view only)
            if (tCurrent > 0) { tCurrent--; renderTestQReview(); }
        }

        function renderTestQReview() {
            // Re-render a previously answered question in read-only mode
            const rec = tAnswers[tCurrent];
            if (!rec) { renderTestQ(); return; }

            const q = tQuestions[tCurrent];
            const total = tQuestions.length;
            tAnswered = true;
            tSelectedLetter = rec.chosen;

            document.getElementById('topbarText').innerText = `Câu ${tCurrent+1} / ${total}`;
            document.getElementById('tpFill').style.width = `${((tCurrent+1)/total)*100}%`;
            document.getElementById('btnBack').disabled = tCurrent===0;
            document.getElementById('btnNext').disabled = false;
            document.getElementById('btnNext').innerText = tCurrent===total-1 ? 'Finish ✓' : 'Next ▶';

            // Rebuild left checkboxes
            const letters = q.o.map(o=>o.charAt(0));
            const cbList = document.getElementById('cbList');
            cbList.innerHTML='';
            letters.forEach(letter=>{
                const row=document.createElement('div');
                row.className='cb-row cb-disabled';
                row.dataset.letter=letter;
                const correctLetter = rec.correct.trim()[0];
                if(letter===correctLetter) row.classList.add('cb-correct');
                else if(letter===rec.chosen&&letter!==correctLetter) row.classList.add('cb-wrong');
                const mark = letter===correctLetter?'✓':(letter===rec.chosen?'✗':'');
                row.innerHTML=`<div class="cb-box">${mark}</div><span class="cb-letter">${letter}</span>`;
                cbList.appendChild(row);
            });

            // Rebuild right options
            document.getElementById('testQNum').innerText=`Câu ${tCurrent+1} / ${total}`;
            document.getElementById('testQText').innerText=q.q;
            const optsList=document.getElementById('testOptsList');
            optsList.innerHTML='';
            q.o.forEach(opt=>{
                const el=document.createElement('div');
                el.className='test-opt-item toi-disabled';
                el.dataset.letter=opt.charAt(0);
                const l=opt.charAt(0), correctLetter=rec.correct.trim()[0];
                if(l===correctLetter) el.classList.add('toi-correct');
                else if(l===rec.chosen&&l!==correctLetter) el.classList.add('toi-wrong');
                el.innerText=opt;
                optsList.appendChild(el);
            });

            // Feedback
            const fb=document.getElementById('answerFeedback');
            fb.style.display='block';
            if(rec.ok){
                fb.className='answer-feedback af-correct';
                fb.innerHTML=`<b>✅ Chính xác!</b>Đáp án đúng: <strong>${rec.correct}</strong> — ${rec.correctText}`;
            } else {
                fb.className='answer-feedback af-wrong';
                fb.innerHTML=`<b>❌ Chưa đúng!</b>Đáp án đúng: <strong>${rec.correct}</strong> — ${rec.correctText}<br><span style="color:#64748b;font-size:0.9rem;">Bạn đã chọn: ${rec.chosen}</span>`;
            }
        }

        function testNext() {
            const q = tQuestions[tCurrent];
            const total = tQuestions.length;

            // If not yet answered, reveal first
            if (!tAnswered && tSelectedLetter) {
                revealAnswer(q);
                return;
            }
            if (!tAnswered && !tSelectedLetter) {
                // nudge user
                document.getElementById('answerFeedback').style.display='block';
                document.getElementById('answerFeedback').className='answer-feedback af-wrong';
                document.getElementById('answerFeedback').innerHTML='<b>⚠️ Hãy chọn một đáp án trước!</b>';
                return;
            }

            // Move to next
            if (tCurrent < total-1) {
                tCurrent++;
                if (tCurrent < tAnswers.length) renderTestQReview();
                else renderTestQ();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('testArea').classList.add('hidden');
            document.getElementById('testResult').classList.remove('hidden');

            const total = tQuestions.length;
            const pct = Math.round((tCorrect/total)*100);

            const ring = document.getElementById('scoreRing');
            ring.className = 'score-ring ' + (pct>=80?'ring-great':pct>=50?'ring-ok':'ring-bad');
            document.getElementById('srNum').innerText = `${tCorrect}/${total}`;
            document.getElementById('srPct').innerText = `${pct}%`;
            document.getElementById('resultTitle').innerText = pct>=80?'🎉 Xuất sắc!':pct>=50?'👍 Khá tốt!':'💪 Cần ôn thêm!';
            document.getElementById('resultSub').innerText = `Đúng ${tCorrect} · Sai ${total-tCorrect} · Tổng ${total} câu`;

            const wrongCount = total-tCorrect;
            document.getElementById('btnRetryWrong').style.display = wrongCount>0?'':'none';

            const list = document.getElementById('resultList');
            list.innerHTML='';
            tAnswers.forEach((rec,i)=>{
                const el=document.createElement('div');
                el.className=`ri ${rec.ok?'ri-ok':'ri-bad'}`;
                el.innerHTML=`
                    <div class="ri-top">
                        <span class="ri-badge ${rec.ok?'badge-ok':'badge-bad'}">${rec.ok?'✅ Đúng':'❌ Sai'}</span>
                        <div class="ri-q">Câu ${i+1}: ${rec.q}</div>
                    </div>
                    <div class="ri-ans ri-correct">Đáp án: ${rec.correct} — ${rec.correctText}</div>
                    ${!rec.ok?`<div class="ri-ans ri-chosen">Bạn chọn: ${rec.chosen}</div>`:''}
                `;
                list.appendChild(el);
            });
        }

        function retryWrong() {
            const wrongQs = tAnswers.filter(r=>!r.ok).map(r=>tQuestions.find(q=>q.q===r.q)).filter(Boolean);
            if(wrongQs.length===0) return;
            startTest(wrongQs);
        }

        function resetTest() {
            document.getElementById('testSetup').classList.remove('hidden');
            document.getElementById('testArea').classList.add('hidden');
            document.getElementById('testResult').classList.add('hidden');
        }
</script>
</body>
</html>
