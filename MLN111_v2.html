<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLN111 - Ôn Tập Triết Học Mác-Lênin</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --bg: #f1f5f9; --card: #ffffff;
            --text: #1e293b; --success: #16a34a; --error: #dc2626;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* ===== HEADER ===== */
        .site-header {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .site-header .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: white;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
        }
        .site-header h1 { font-size: 1.1rem; font-weight: 600; }

        .container { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* ===== STATS BAR ===== */
        .stats-bar {
            background: var(--card);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            flex-wrap: wrap;
        }
        .stat-item { font-size: 0.95rem; font-weight: 600; color: #475569; }
        .stat-item span { color: var(--primary); }

        /* ===== NAV TABS ===== */
        .nav-tabs {
            display: flex; gap: 8px; margin-bottom: 18px;
            flex-wrap: wrap; justify-content: center;
        }
        .nav-btn {
            padding: 9px 20px; border: 2px solid var(--border);
            border-radius: 8px; cursor: pointer; font-weight: 600;
            font-size: 0.95rem; background: white; color: var(--text);
            transition: all 0.18s;
        }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ===== VIEWS ===== */
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        /* ===== FLASHCARD ===== */
        .flashcard-wrap { padding: 24px; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .flashcard { perspective: 1000px; height: 280px; cursor: pointer; margin-bottom: 18px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            border-radius: 12px; border: 2px solid #e2e8f0; background: white; text-align: center;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f0fdf4; border-color: var(--success); }
        .fc-controls { display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; background: #e2e8f0; color: var(--text); font-size: 0.95rem; }
        .btn:hover { background: #cbd5e1; }

        /* ===== QUIZ VIEW ===== */
        .quiz-wrap { padding: 24px; }
        .quiz-question { font-size: 1.15rem; font-weight: 600; margin-bottom: 18px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 13px 16px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: all 0.18s; }
        .option:hover:not(.disabled) { border-color: var(--primary); background: #eff6ff; }
        .option.correct { background: #dcfce7; border-color: var(--success); color: var(--success); font-weight: 600; }
        .option.wrong { background: #fee2e2; border-color: var(--error); color: var(--error); }
        .option.disabled { pointer-events: none; }

        /* ===== LIST VIEW ===== */
        .list-wrap { padding: 24px; }
        .search-box { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 18px; font-size: 1rem; }
        .q-list { display: flex; flex-direction: column; gap: 12px; max-height: 560px; overflow-y: auto; }
        .q-item { padding: 14px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
        .q-item strong { color: var(--primary); display: block; margin-bottom: 6px; font-size: 0.97rem; }
        .q-item .ans { color: var(--success); font-weight: bold; margin-top: 6px; font-size: 0.93rem; }

        /* ===== TEST VIEW ===== */
        .hidden { display: none !important; }

        /* Setup screen */
        .test-setup { padding: 36px 24px; text-align: center; }
        .test-setup h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 8px; }
        .test-setup p { color: #64748b; margin-bottom: 24px; }
        .num-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
        .num-btn { padding: 10px 24px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; background: white; color: var(--text); transition: all 0.18s; }
        .num-btn.sel, .num-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .custom-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 22px; }
        .custom-row label { font-weight: 600; color: #64748b; }
        .custom-row input { width: 80px; padding: 9px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; text-align: center; font-weight: 600; }
        .btn-start { background: var(--primary); color: white; padding: 13px 36px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .btn-start:hover { background: var(--primary-dark); }

        /* ===== KIZSPY-STYLE TEST AREA ===== */
        .test-topbar {
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px 12px 0 0;
            font-size: 0.92rem;
            color: #475569;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .test-topbar .tp-progress {
            flex: 1;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
        }
        .test-topbar .tp-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 0%; }

        .test-body {
            display: flex;
            min-height: 420px;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        /* Left panel: answer checkboxes */
        .test-left {
            width: 160px;
            min-width: 140px;
            background: #f8fafc;
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .test-left .answer-label-title {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.97rem;
            margin-bottom: 6px;
        }
        .test-left .choose-hint {
            font-size: 0.82rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        .cb-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            background: white;
            transition: all 0.18s;
            user-select: none;
        }
        .cb-row:hover:not(.cb-disabled) { border-color: var(--primary); background: #eff6ff; }
        .cb-row.cb-selected { border-color: var(--primary); background: #dbeafe; }
        .cb-row.cb-correct { border-color: var(--success); background: #dcfce7; color: var(--success); font-weight: 700; }
        .cb-row.cb-wrong { border-color: var(--error); background: #fee2e2; color: var(--error); font-weight: 700; }
        .cb-row.cb-disabled { pointer-events: none; }
        .cb-box {
            width: 20px; height: 20px;
            border: 2px solid #94a3b8;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.18s;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .cb-row.cb-selected .cb-box { border-color: var(--primary); background: var(--primary); color: white; }
        .cb-row.cb-correct .cb-box { border-color: var(--success); background: var(--success); color: white; }
        .cb-row.cb-wrong .cb-box { border-color: var(--error); background: var(--error); color: white; }
        .cb-letter { font-weight: 700; font-size: 1rem; }

        .test-nav { margin-top: auto; padding-top: 16px; display: flex; gap: 8px; }
        .btn-nav {
            flex: 1; padding: 8px 0; border: 1.5px solid var(--border);
            border-radius: 6px; cursor: pointer; font-weight: 600;
            font-size: 0.9rem; background: white; color: var(--text);
            transition: all 0.18s;
        }
        .btn-nav:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-nav.btn-nav-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nav.btn-nav-primary:hover { background: var(--primary-dark); }

        /* Right panel: question */
        .test-right {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }
        .test-q-num { font-size: 0.88rem; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
        .test-q-text { font-size: 1.08rem; font-weight: 600; line-height: 1.55; margin-bottom: 20px; color: var(--text); }
        .test-opts-list { display: flex; flex-direction: column; gap: 8px; }
        .test-opt-item {
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.97rem;
            cursor: pointer;
            transition: all 0.18s;
            background: white;
        }
        .test-opt-item:hover:not(.toi-disabled) { border-color: var(--primary); background: #eff6ff; }
        .test-opt-item.toi-selected { border-color: var(--primary); background: #dbeafe; }
        .test-opt-item.toi-correct { border-color: var(--success); background: #dcfce7; color: var(--success); font-weight: 600; }
        .test-opt-item.toi-wrong { border-color: var(--error); background: #fee2e2; color: var(--error); }
        .test-opt-item.toi-disabled { pointer-events: none; }

        /* Result feedback under options */
        .answer-feedback {
            margin-top: 14px; padding: 13px 16px;
            border-radius: 9px; font-size: 0.95rem;
            display: none;
        }
        .answer-feedback.af-correct { background: #f0fdf4; border: 1.5px solid #86efac; color: #166534; }
        .answer-feedback.af-wrong { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; }
        .answer-feedback b { display: block; margin-bottom: 3px; font-size: 1rem; }

        /* ===== RESULT SCREEN ===== */
        .result-screen { padding: 28px 24px; }
        .result-top { text-align: center; margin-bottom: 24px; }
        .score-ring {
            width: 120px; height: 120px; border-radius: 50%;
            border: 6px solid; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 14px; font-weight: 700;
        }
        .score-ring .sr-num { font-size: 2.2rem; line-height: 1; }
        .score-ring .sr-pct { font-size: 0.9rem; }
        .ring-great { border-color: var(--success); color: var(--success); background: #f0fdf4; }
        .ring-ok { border-color: #f59e0b; color: #92400e; background: #fffbeb; }
        .ring-bad { border-color: var(--error); color: var(--error); background: #fef2f2; }
        .result-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
        .result-sub { color: #64748b; font-size: 0.95rem; }

        .result-list { display: flex; flex-direction: column; gap: 12px; max-height: 380px; overflow-y: auto; margin-bottom: 22px; }
        .ri { padding: 13px 15px; border-radius: 9px; border: 1.5px solid; }
        .ri.ri-ok { border-color: #86efac; background: #f0fdf4; }
        .ri.ri-bad { border-color: #fca5a5; background: #fef2f2; }
        .ri-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
        .ri-badge { padding: 2px 9px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
        .badge-ok { background: #dcfce7; color: var(--success); }
        .badge-bad { background: #fee2e2; color: var(--error); }
        .ri-q { font-weight: 600; font-size: 0.95rem; line-height: 1.4; }
        .ri-ans { font-size: 0.9rem; margin-top: 3px; }
        .ri-correct { color: var(--success); font-weight: 600; }
        .ri-chosen { color: var(--error); }

        .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn-retry-wrong { background: #fee2e2; color: var(--error); border: none; padding: 11px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.97rem; }
        .btn-retry-wrong:hover { background: #fca5a5; }
        .btn-new-test { background: var(--primary); color: white; border: none; padding: 11px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.97rem; }
        .btn-new-test:hover { background: var(--primary-dark); }

        @media (max-width: 600px) {
            .test-left { width: 110px; min-width: 100px; padding: 14px 10px; }
            .test-right { padding: 16px 14px; }
            .cb-letter { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="site-header">
    <span class="logo">MLN</span>
    <h1>Triết Học Mác-Lênin — 586 câu</h1>
</div>

<div class="container">
    <div class="stats-bar">
        <div class="stat-item">Tổng: <span id="totalQ">586</span> câu</div>
        <div class="stat-item">Đã học: <span id="learnedQ">0</span></div>
        <div class="stat-item">Đánh dấu: <span id="markedQ">0</span></div>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchView('flashcard', this)">🃏 Flashcard</button>
        <button class="nav-btn" onclick="switchView('quiz', this)">📝 Trắc Nghiệm</button>
        <button class="nav-btn" onclick="switchView('list', this)">📋 Danh Sách</button>
        <button class="nav-btn" onclick="switchView('test', this)">🎯 Kiểm Tra</button>
    </div>

    <!-- ===== FLASHCARD ===== -->
    <div id="flashcard" class="view active">
        <div class="card flashcard-wrap">
            <div class="progress-bar"><div class="progress-fill" id="fcProgress"></div></div>
            <div class="flashcard" onclick="this.classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <h3 id="fcQuestion" style="font-size:1.05rem; line-height:1.5;">Câu hỏi...</h3>
                        <p style="margin-top:12px; color:#94a3b8; font-size:0.88rem;">(Chạm để lật xem đáp án)</p>
                    </div>
                    <div class="flashcard-back">
                        <h3 id="fcAnswer" style="color:var(--success); font-size:1.1rem;">Đáp án...</h3>
                        <div id="fcOptions" style="margin-top:12px; text-align:left; width:100%; font-size:0.92rem;"></div>
                    </div>
                </div>
            </div>
            <div class="fc-controls">
                <button class="btn" onclick="prevCard()">← Trước</button>
                <button class="btn" onclick="toggleMark()" id="markBtn">🚩 Đánh dấu</button>
                <button class="btn" onclick="nextCard()">Tiếp →</button>
            </div>
        </div>
    </div>

    <!-- ===== QUIZ ===== -->
    <div id="quiz" class="view">
        <div class="card quiz-wrap">
            <div class="progress-bar"><div class="progress-fill" id="quizProgress"></div></div>
            <div class="quiz-question" id="quizQuestion">Câu hỏi...</div>
            <div class="options" id="quizOptions"></div>
            <div style="margin-top:18px; display:flex; justify-content:space-between;">
                <button class="btn" onclick="prevQuiz()">← Trước</button>
                <button class="btn" onclick="nextQuiz()">Tiếp →</button>
            </div>
        </div>
    </div>

    <!-- ===== LIST ===== -->
    <div id="list" class="view">
        <div class="card list-wrap">
            <input type="text" class="search-box" placeholder="🔍 Tìm kiếm câu hỏi..." oninput="filterList(this.value)">
            <div class="q-list" id="qList"></div>
        </div>
    </div>

    <!-- ===== TEST ===== -->
    <div id="test" class="view">

        <!-- Setup -->
        <div id="testSetup" class="card test-setup">
            <h2>🎯 Kiểm Tra Nhanh</h2>
            <p>Chọn số câu muốn kiểm tra. Hệ thống chấm điểm và cho làm lại câu sai.</p>
            <div class="num-btns">
                <button class="num-btn sel" onclick="selectNum(this,10)">10 câu</button>
                <button class="num-btn" onclick="selectNum(this,20)">20 câu</button>
                <button class="num-btn" onclick="selectNum(this,30)">30 câu</button>
                <button class="num-btn" onclick="selectNum(this,50)">50 câu</button>
            </div>
            <div class="custom-row">
                <label>Hoặc nhập số câu:</label>
                <input type="number" id="customNum" min="1" max="586" placeholder="VD: 25" oninput="clearPreset()">
            </div>
            <button class="btn-start" onclick="startTest(null)">▶ Bắt đầu làm bài</button>
        </div>

        <!-- Test Area (kizspy layout) -->
        <div id="testArea" class="card hidden">
            <div class="test-topbar">
                <span id="topbarText">Câu 1 / 10</span>
                <div class="tp-progress"><div class="tp-fill" id="tpFill"></div></div>
                <span id="topbarScore">✅ 0 &nbsp; ❌ 0</span>
            </div>
            <div class="test-body">
                <!-- Left: checkboxes -->
                <div class="test-left">
                    <div class="answer-label-title">Answer</div>
                    <div class="choose-hint" id="chooseHint">(Choose 1 answer)</div>
                    <div id="cbList"></div>
                    <div class="test-nav">
                        <button class="btn-nav" id="btnBack" onclick="testBack()">◀ Back</button>
                        <button class="btn-nav btn-nav-primary" id="btnNext" onclick="testNext()">Next ▶</button>
                    </div>
                </div>
                <!-- Right: question + options -->
                <div class="test-right">
                    <div class="test-q-num" id="testQNum"></div>
                    <div class="test-q-text" id="testQText"></div>
                    <div class="test-opts-list" id="testOptsList"></div>
                    <div class="answer-feedback" id="answerFeedback"></div>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="testResult" class="card hidden result-screen">
            <div class="result-top">
                <div id="scoreRing" class="score-ring ring-ok">
                    <span class="sr-num" id="srNum">0/0</span>
                    <span class="sr-pct" id="srPct">0%</span>
                </div>
                <div class="result-title" id="resultTitle">Kết quả</div>
                <div class="result-sub" id="resultSub"></div>
            </div>
            <div class="result-list" id="resultList"></div>
            <div class="result-actions">
                <button class="btn-retry-wrong" id="btnRetryWrong" onclick="retryWrong()">🔁 Làm lại câu sai</button>
                <button class="btn-new-test" onclick="resetTest()">🆕 Bài kiểm tra mới</button>
            </div>
        </div>

    </div><!-- end #test -->
</div><!-- end .container -->

<script>
        const questions = [
{q:`Xanh-ximông là đại biểu của trường phái nào?(NHUNG HOÀNG)`,o:[`A. Chủ nghĩa xã hội không tưởng Pháp`,`B. Chủ nghĩa xã hội không tưởng Đức`,`C. Triết học cổ điển Đức`,`D. Kinh tế chính trị học Anh`],a:`A`},
{q:`Quan hệ giữa người với người trong quá trình sản xuất được gọi là gì?`,o:[`A. Quan hệ xã hội`,`B. Quan hệ tổ chức quản lý`,`C. Quan hệ sản xuất`,`D. Quan hệ điều tiết`],a:`C`},
{q:`Một sinh viên tóm tắt nội dung quy luật về sự phủ hợp giữa quan hệ sản xuất với trình độ của như sau. Đáp án nào sau đây là đúng?`,o:[`A. Quy luật này vạch rõ sự phụ thuộc khách quan của lực lượng sản xuất vào quan hệ sản xuất`,`B. Sự hình thành, biến đổi và phát triển của quan hệ sản xuất được quyết định bởi lực lượng`,`C. Lực lượng sản xuất và quan hệ sản xuất là hai mặt của phương thức sản xuất, chúng tồn tại`,`D. Quy luật này chỉ tồn tại trong một vài xã hội`],a:`B`},
{q:`Tri thức nào sau đây nảy sinh một cách trực tiếp từ thực tiễn lao động sản xuất?(NHUNG HOÀNG)`,o:[`A. Tri thức kinh nghiệm`,`B. Tri thức lý luận`,`C. Tri thức lý luận khoa học`,`D. Tri thức lý luận thực tiễn`],a:`A`},

{q:`Tiêu chí nào là quan trọng nhất để phân biệt các hình thái kinh tế xã hội`,o:[`A. Lực lượng sản xuất`,`B. Quan hệ sản xuất`,`C. Tồn tại xã hội`,`D. Kiến trúc thượng tầng`],a:`B`},
{q:`Nguyên tác thống nhất giữa lý luận và thực tiễn là nguyên tắc được rút ra (trực tiếp) từ mối quan hệ nào?`,o:[`A. Mối quan hệ giữa vật chất và ý thức.`,`B. Lý luận và nhận thức.`,`C. Quan hệ giữa khả năng và hiện thực`,`D. Phán đoán suy luận`],a:`A`},
{q:`Theo quan điểm của phép biện chứng duy vật thì quy luật nào vạch ra nguồn gốc của sự phát triển cơ bản phổ biến của sự vận động và phát triển`,o:[`A. Quy luật thống nhất và đấu tranh của các mặt đối lập`,`B. Quy luật về chuyển hóa sự thay đổi về lượng dẫn đến sự thay đổi về chất và ngược lại`,`C. Quy luật phủ định của phủ định`,`D. Quy luật về sự phù hợp của QHSX và trình độ LLSX`],a:`A`},
{q:`Theo quan điểm của phép biện chứng duy vật thì quy luật nào vạch ra cách thức/ hình thức của sự phát triển cơ bản phổ biến của sự vận động và phát triển`,o:[`A. Quy luật thống nhất và đấu tranh của các mặt đối lập`,`B. Quy luật về chuyển hóa sự thay đổi về lượng dẫn đến sự thay đổi về chất và ngược lại(Quy luật lượng- chất)`,`C. Quy luật phủ định của phủ định`,`D. Quy luật về sự phù hợp của QHSX và trình độ LLSX`],a:`B`},
{q:`Triết học của các nhà tư tưởng thời kỳ Phục Hưng có đặc điểm gì?`,o:[`A. Có tính chất duy vật tự phát`,`B. Có tính chất duy tâm khách quan`,`C. Còn pha trộn giữa các yếu tố duy vật và duy tâm`,`D. Còn pha trộn giữa các yếu tố duy tâm thần bí và siêu hình`],a:`C`},
{q:`Một trong các nội dung định nghĩa của Lênin về vật chất đó là, vật chất được cảm giác của chúng ta chép lại, chụp lại, phản ánh và tồn tại.`,o:[`A. Lệ thuộc vào cảm giác`,`B. Không lệ thuộc vào cảm giác`,`C. Tuỳ thuộc vào nhận thức`,`D. Tuỳ theo ý thức`],a:`B`},
{q:`Theo Lênin, vật chất dưới hình thức thế nào thì là cái có thể gây nên cảm giác của con người khi nó trực tiếp hay gián tiếp tác động đến giác quan của con người?(NHUNG HOÀNG)`,o:[`A. Những dạng cụ thể`,`B. Tồn tại khách quan`,`C. Khái quát của nó`,`D. Tự nhiên của nó`],a:`A`},
{q:`Chủ nghĩa duy vật lịch sử cho rằng, cuộc đấu tranh giữa những người lao động làm thuê, những người nô lệ bị áp bức về chính trị- xã hội và bị bóc lột về kinh tế chống lại bọn áp bức và bóc lột nó là thực chất (Kiểu hỏi khác: Theo quan điểm của chủ nghĩa duy vật lịch sử, cuộc đấu tranh giữa những người lao động làm thuê... thực chất là gì?)`,o:[`A. Đấu tranh giai cấp`,`B. Ra đời giai cấp`,`C. Cách mạng`,`D. Ra đời nhà nước`],a:`A`},
{q:`Chủ nghĩa duy vật lịch sử cho rằng, tồn tại xã hội là khái niệm dùng để chỉ phương diện sinh hoạt vật chất và những điều kiện gì của xã hội?`,o:[`A. Văn hoá tinh thần`,`B. Sinh hoạt tinh thần`,`C. Sinh hoạt vật chất`,`D. Kinh tế`],a:`C`},
{q:`Tồn tại xã hội là gì?`,o:[`A. Sinh hoạt vật chất và những điều kiện sinh hoạt vật chất của xã hội`,`B. Toàn bộ các giá trị tinh thần của xã hội`,`C. Toàn bộ các điều kiện sinh hoạt của xã hội`,`D. Toàn bộ hệ tư tưởng về sự tồn tại của xã hội`],a:`A`},
{q:`Chủ nghĩa xã hội không tưởng đề cao yếu tố gì?`,o:[`A. Tinh thần nhân đạo`,`B. Xã hội đại đồng`,`C. Sư bình đẳng`,`D. Một xã hội không còn sự bóc lột`],a:`A`},
{q:`Vị trí của quy luật phủ định của phủ định trong phép biện chứng duy vật`,o:[`A. Chỉ ra cách thức của sự phát triển`,`B. Chỉ ra nguồn gốc của sự phát triển`,`C. Chỉ ra nguyên nhân của sự phát triển`,`D. Chỉ ra khuynh hướng của sự phát triển`],a:`D`},
{q:`Hệ thống những quan điểm lý luận chung nhất về thế giới và về vị trí của con người trong thế giới đó là:`,o:[`A. Quan điểm biện chứng`,`B. Chủ nghĩa duy vật`,`C. Chủ nghĩa duy vật biện chứng`,`D. Triết học`],a:`D`},
{q:`Quan điểm ủng hộ cái mới tiến bộ, từ đó chống lại cái cũ, cái lỗi thời kìm hãm sự phát triển là quan điểm được rút ra trực tiếp từ:`,o:[`A. Quy luật từ những thay đổi về lượng dẫn đến những thay đổi về chất và ngược lại`,`B. Quy luật thống nhất và quy luật đấu tranh của các mặt đối lập`,`C. Quy luật phủ định của phủ định`],a:`C`},
{q:`Học thuyết Hình thái kinh tế- xã hội là nội dung của`,o:[`A. Phép biện chứng`,`B. Tất cả các đáp án đều đúng`,`C. Chủ nghĩa duy vật biện chứng`,`D. Chủ nghĩa duy vật lịch sử`],a:`D`},
{q:`Cách thức mà con người dùng để tiến hành quá trình sản xuất của xã hội ở những giai đoạn lịch sử nhất định gọi là:`,o:[`A. Phương thức sản xuất`,`B. Nghệ thuật sản xuất`,`C. Kỹ thuật sản xuất`,`D. Công nghệ sản xuất`],a:`A`},
{q:`Đâu là nhận định sai về Triết học Mác?`,o:[`A. Triết học Mác cho rằng triết học là khoa học của mọi khoa học`,`B. Theo quan điểm của triết học Mác triết học không thay thế được các khoa học cụ thể`,`C. Theo quan điểm của triết học Mác thì sự phát triển của triết học quan hệ chặt chẽ với sự phát triển của khoa học tự nhiên`,`D. Triết học Mác là sự tổng hợp của các trường phái triết học trong lịch sử`],a:`A`},
{q:`Từ thế kỉ VIII trước công nguyên với nhà nước đầu tiên trong lịch sử, giai cấp tư hữu đã dùng pháp luật và bộ máy thống trị của mình để chiếm mất quyền lực của đông đảo quần chúng nhân dân lao động là những...`,o:[`A. Nông dân`,`B. Người tự do`,`C. Người nô lệ`,`D. Nông nô`],a:`C`},
{q:`Theo quan điểm của chủ nghĩa duy vật biện chứng lịch sử, xã hội loài người đã trải qua bao nhiêu hình thái kinh tế xã hội? (Giải thích: Công xã nguyên thủy, Chiếm hữu nô lệ, Phong kiến, Tư bản chủ nghĩa, Cộng sản chủ nghĩa) (Kiểu hỏi khác: Theo quan điểm của chủ nghĩa duy vật lịch sử, loài người đã và đang trải qua bao nhiêu hình thái kinh tế- xã hội?)`,o:[`A. Bốn hình thái kinh tế xã hội`,`B. Ba hình thái kinh tế xã hội`,`C. Năm hình thái kinh tế xã hội`],a:`C`},
{q:`Hãy xác định luận điểm nào sai khi đề cập đến"mối quan hệ biện chứng giữa cơ sở hạ tầng và kiến trúc thượng tầng"?`,o:[`A. Sự phát triển của lực lượng sản xuất trực tiếp làm thay đổi quan hệ sản xuất, và thông qua đó làm thay đổi kiến trúc thượng tầng`,`B. Cơ sở hạ tầng thay đổi thì sớm muộn gì kiến trúc thượng tầng cũng thay đổi theo`,`C. Trong xã hội có giai cấp, giai cấp nào thống trị về kinh tế thì sẽ thống trị về chính trị, tư tưởng`,`D. Các mâu thuẫn trong chính trị, tư tưởng xét đến cùng quyết định các mâu thuẫn trong lĩnh vực kinh tế`],a:`D`},
{q:`Theo quan điểm của chủ nghĩa duy vật biện chứng, trong thực tế chúng ta phải dựa vào điều gì?(NHUNG HOÀNG) (Kiểu hỏi khác: Theo quan điểm của chủ nghĩa duy vật biện chứng về mỗi quan hệ giữa tất nhiên và ngẫu nhiên, trong hoạt động thực tiễn, cần dựa vào điều gì?)`,o:[`A. Dựa vào tất nhiên, đề phòng ngẫu nhiên`,`B. Dựa vào ngẫu nhiên, đề phòng tất nhiên`,`C. Dựa vào cả tất nhiên và ngẫu nhiên`,`D. Không dựa vào các yếu tố nào mang tính tất nhiên, ngẫu nhiên`],a:`A`},
{q:`Đấu tranh giai cấp có vai trò gì đối với sự phát triển của xã hội?`,o:[`A. Kìm hãm sự phát triển của xã hội`,`B. Tất cả đều sai`,`C. Không có vai trò gì`,`D. Là động lực thúc đẩy`],a:`D`},
{q:`Cơ sở trực tiếp và chủ yếu nhất để hình thành khái niệm là`,o:[`A. Thế giới tự nhiên`,`B. Thực tiễn`,`C. Cảm giác`,`D. Tri giác và biểu tượng`],a:`B`},
{q:`Trong chủ nghĩa Mác- Lênin, bộ phận lý luận nào có chức năng làm sáng tỏ bản chất và những quy luật chung nhất của mọi sự vận động, phát triển của thế giới?`,o:[`A. Triết học Mác- Lênin`,`B. Kinh tế chính trị Mác- Lênin`,`C. Chủ nghĩa xã hội khoa học`,`D. Không có bộ phận nào giữ chức năng đó vì chủ nghĩa Mác- Lênin thuộc khoa học xã hội`],a:`A`},
{q:`Theo quan điểm của chủ nghĩa duy vật lịch sử, yếu tố cơ bản nhất tạo thành điều kiện sinh hoạt vật chất của xã hội là các yếu tố thuộc về`,o:[`A. Điều kiện tự nhiên`,`B. Điều kiện dân cư`,`C. Phương thức sản xuất ra của cải vật chất`,`D. Không có yếu tố nào là cơ bản nhất mà tùy thuộc các điều kiện lịch sử cụ thể khác nhau`],a:`C`},
{q:`Chủ nghĩa Mác- Lênin sẽ phát triển đạt đến đâu?`,o:[`A. Đã phát triển đến mức hoàn toàn đầy đủ`,`B. Trong đó mọi vấn đề được giải quyết triệt để, chỉ cần nghiên cứu và vận dụng trong thực tiễn`,`C. Có thể thay thế cho mọi khoa học`,`D. Không ngừng phát triển trên cơ sở tổng kết những thành tựu mới của sự phát triển các khoa học và thực tiễn`],a:`D`},
{q:`Theo quan điểm duy tâm, lực lượng sáng tạo ra lịch sử là: (Cách hỏi khác: Theo quan điểm của chủ nghĩa duy tâm chủ quan, lực lượng sáng tạo ra lịch sử là lực lượng nào?)`,o:[`A. Quần chúng nhân dân lao động`,`B. Giai cấp thống trị xã hội`,`C. Các vĩ nhân, những cá nhân kiệt xuất`,`D. Giai cấp bị trị xã hội`],a:`C`},
{q:`Chủ nghĩa nào mà sự tồn tại phát triển của nó thường gắn với lợi ích giai cấp và các lực lượng tiến bộ trong lịch sử?`,o:[`A. Duy vật thô sơ`,`B. Duy vật`,`C. Duy tâm khách quan`,`D. Chiết trung`],a:`B`},
{q:`Hình thức hoạt động thực tiễn cơ bản nhất quy định các hình thức hoạt động khác là hình thức nào sau đây?`,o:[`A. Hoạt động chính trị xã hội`,`B. Hoạt động quan sát và thực nghiệm khoa học`,`C. Hoạt động sản xuất vật chất`,`D. Hoạt động kinh tế`],a:`C`},
{q:`Theo quan điểm duy vật lịch sử thì xã hội có các loại hình sản xuất cơ bản nào?`,o:[`A. Sản xuất ra của cải vật chất, đời sống tinh thần và nghệ thuật`,`B. Sản xuất ra văn hóa, con người và đời sống tinh thần`,`C. Sản xuất ra của cải vật chất, tinh thần và văn hóa`,`D. Sản xuất ra của cải vật chất, tinh thần và con người`],a:`D`},
{q:`Theo quan điểm duy vật lịch sử, nguồn gốc sâu xa của các cuộc cách mạng là do đâu?`,o:[`A. Mâu thuẫn gay gắt giữa lực lượng sản xuất và quan hệ sản xuất`,`B. Giai cấp cầm quyền bị khủng hoảng về đường lối cai trị`,`C. Quần chúng lao động bị áp bức`,`D. Quần chúng lao động bị áp bức nặng nề`],a:`A`},
{q:`Chọn phương án đúng về đấu tranh giai cấp?`,o:[`A. Đấu tranh giai cấp là một trong những động lực phát triển của xã hội có giai cấp`,`B. Đấu tranh giai cấp là động lực mạnh mẽ nhất làm thay đổi xã hội`,`C. Đấu tranh giai cấp là một trong những động lực phát triển của xã hội`,`D. Đấu tranh giai cấp là động lực phát triển của xã hội`],a:`A`},
{q:`"Những thời đại kinh tế khác nhau không phải ở chỗ chúng sản xuất ra cái gì, mà là ở chỗ chúng sản xuất bằng cách nào, với những tư liệu lao động nào". Câu nói trên là của ai?`,o:[`A. Ph.Ăng ghen`,`B. D. Ricardo`,`C. Mác`],a:`C`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Quá trình"lịch sử tự nhiên" của sự phát triển các hình thái kinh tế xã hội là quá trình phát triển theo(NHUNG HOÀNG)`,o:[`A. Ý niệm tuyệt đối`,`B. Quy luật khách quan của xã hội`,`C. Quy luật của tự nhiên`,`D. Ý muốn chủ quan của con người`],a:`C`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Chủ thể sáng tạo chân chính ra lịch sử là:`,o:[`A. Quần chúng nhân dân`,`B. Các cá nhân kiệt xuất, các vĩ nhân`,`C. Giai cấp thống trị`,`D. Tầng lớp trí thức trong xã hội`],a:`A`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Mỗi phương thức sản xuất đều được tạo nên bởi hai mặt:`,o:[`A. Kỹ thuật và công nghệ`,`B. Kỹ thuật và lao động`,`C. Kỹ thuật và kinh tế`,`D. Kỹ thuật và tổ chức`],a:`B`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Sản xuất ra của cải vật chất giữ vai trò là:`,o:[`A. Nền tảng của xã hội`,`B. Nền tảng vật chất của xã hội`,`C. Nền tảng tinh thần của xã hội`,`D. Nền tảng kỹ thuật, công nghệ của xã hội`],a:`B`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Thực chất của quá trình sản xuất vật chất là quá trình:`,o:[`A. Con người thực hiện sự cải biến giới tự nhiên`,`B. Con người nhận thức thế giới và bản thân mình`,`C. Con người thực hiện sáng tạo trong tư duy`,`D. Con người thực hiện lợi ích của mình`],a:`A`},
{q:`Chọn câu trả lời đúng theo quan điểm duy vật lịch sử: Nhân tố quyết định trong lực lượng sản xuât là nhân tố:`,o:[`A. Tư liệu sản xuất`,`B. Người lao động`,`C. Công cụ lao động`],a:`B`},
{q:`Chọn câu trả lời đúng, đầy đủ nhất theo quan niệm duy vật lịch sử: Cách mạng xã hội giữ vai trò là (Kiểu hỏi khác: Theo quan điểm của chủ nghĩa duy vật lịch sử, cách mạng xã hội giữa vai trò gì?)`,o:[`A. Nguồn gốc và động lực tiến bộ của xã hội`,`B. Động lực phát triển của mọi xã hội`,`C. Một trong những phương thức, động lực phát triển xã hội`,`D. Phương thức, động lực cơ bản nhất của sự phát triển xã hội trong điều kiện xã hội có sự phân hóa thành đối kháng giai cấp`],a:`D`},
{q:`Theo quan điểm của chủ nghĩa duy vật lịch sử, nguồn gốc, động lực cơ bản nhất của mọi quá trình phát triển xã hội là gì?`,o:[`A. Sự phát triển của khoa học`,`B. Sự vận động của mâu thuẫn giữa lực lượng sản xuất và quan hệ sản xuất`,`C. Sự phát triển của khoa học công nghệ`,`D. Đấu tranh giai cấp`],a:`B`},
{q:`Xét đến cùng, nhân tố quan trọng nhất quyết định sự thắng lợi của một trật tự xã hội mới là`,o:[`A. Năng suất lao động`,`B. Luật pháp`,`C. Chính trị`,`D. Kinh tế`],a:`A`},
{q:`Quan hệ sản xuất là phạm trù dùng để chỉ`,o:[`A. Quan hệ giữa con người sản xuất với người tiêu dùng trong quá trình sản xuất`,`B. Quan hệ giữa người với người trong quá trình sản xuất`,`C. Quan hệ giữa con người với tự nhiên trong quá trình sản xuất`],a:`B`},
{q:`Chọn câu trả lời đúng. Lực lượng sản xuất bao gồm:`,o:[`A. Tư liệu sản xuất và người lao động`,`B. Người lao động và công cụ lao động`,`C. Người lai động và trình độ lao động của họ`,`D. Tư liệu sản xuất và các nguồn lực tự nhiên`],a:`A`},
{q:`Quan niệm cho rằng "suy nghĩ của những người sống trong túp lều tranh luôn luôn khác với suy nghĩ của những kẻ sống trong cung điện" là quan điểm của`,o:[`A. Chủ nghĩa duy tâm`,`B. Chủ nghĩa duy vật siêu hình`,`C. Chủ nghĩa duy vật lịch sử`,`D. Chủ nghĩa duy vật`],a:`B`},
{q:`Bản chất của con người được quyết định bởi`,o:[`A. Các quan hệ xã hội`,`B. Giáo dục gia đình`,`C. Sự nỗ lực của cá nhân`,`D. Giáo dục nhà trường`],a:`A`},
{q:`Một sinh viên chuẩn bị bài thuyết trình trong một tháng theo cách thức: Tuần đầu phác thảo đề cương và hàng ngày dành 30 phút sửa chữa bổ sung hoàn thiện.Vào buổi thuyết trình sinh viên đã có một bản thảo hoàn chỉnh. Công việc trên đã diễn ra theo quy luật, nguyên lý nào?`,o:[`A. Quy luật lượng chất`],a:`A`},
{q:`Đặc trưng chủ yếu của cách mạng xã hội là gì?`,o:[`A. Sự thay đổi về hệ tư tưởng nói riêng và toàn bộ đời sống tinh thần của xã hội nói chung`,`B. Sự thay đổi về cơ cấu, tổ chức hoạt động sản xuất ra của cải vật chất trong xã hội`,`C. Sự thay đổi chính quyền nhà nước từ tay giai cấp thống trị đã lỗi thời sang tay giai cấp cách mạng.`,`D. Sự thay đổi về thế lực cầm quyền trong cùng một giai cấp`],a:`C`},
{q:`Theo quan điểm của phép biện chứng duy vật thì quy luật nào vạch ra khuynh hướng cơ bản phổ biến của sự vận động và phát triển`,o:[`A. Quy luật thống nhất và đấu tranh của các mặt đối lập`,`B. Quy luật về chuyển hóa sự thay đổi về lượng dẫn đến sự thay đổi về chất và ngược lại`,`C. Quy luật phủ định của phủ định`,`D. Quy luật về sự phù hợp của QHSX và trình độ LLSX`],a:`C`},
{q:`Trong 3 đặc trưng của giai cấp, đặc trưng nào giữ vai trò chi phối các đặc trưng khác?`,o:[`A. Tập đoàn này có thể chiếm đoạt lao động của tập đoàn khác`,`B. Khác nhau về quan hệ sở hữu tư liệu sản xuất xã hội`,`C. Khác nhau về vai trò trong tổ chức lao động xã hội`,`D. Khác nhau về địa vị trong hệ thống tổ chức xã hội`],a:`B`},
{q:`Khái niệm nào chỉ sự quy định, sự tác động qua lại, sự chuyển hoá lẫn nhau giữa các sự vật, hiện tượng hay giữa các mặt, các yếu tố trong một sự vật, hiện tượng?`,o:[`A. Mối liên hệ`,`B. Sự phát triển`,`C. Sự thay đổi`,`D. Sự biến đổi`],a:`A`},
{q:`Khái niệm quan hệ sản xuất được hiểu là`,o:[`A. Mối quan hệ giữa người với người trong quá trình sản xuất`,`B. Mối quan hệ giữa người với người trong quá trình tiêu dùng`,`C. Mối quan hệ giữa người với người trong quá trình phân phối`,`D. Mối quan hệ giữa người với người trong quá trình hoạch định`],a:`A`},
{q:`Khái niệm lực lượng sản xuất được hiểu là`,o:[`A. Toàn bộ những năng lực thực tiễn dùng trong sản xuất của xã hội`,`B. Toàn bộ những năng lực thực tiễn dùng trong tiêu dùng của xã hội`,`C. Toàn bộ những năng lực thực tiễn dùng trong phân phối của xã hội`,`D. Toàn bộ những năng lực thực tiễn dùng trong hoạch định của xã hội`],a:`A`},
{q:`Mối quan hệ giữa cơ sở hạ tầng và kiến trúc thượng tầng là mối quan hệ: (NHUNG HOÀNG)`,o:[`A. Luôn luôn thống nhất với nhau`,`B. Luôn luôn đối lập nhau`,`C. Thống nhất và đấu tranh giữa hai mặt đối lập`,`D. Thống nhất là căn bản, còn đấu tranh giữa chúng chỉ là tạm thời`],a:`C`},
{q:`V.I. Lênin cho rằng: Tính....không thể tách rời tính phổ biến.(NHUNG HOÀNG)`,o:[`A. Nhân quả`,`B. Tất nhiên`,`C. Đơn nhất`,`D. Hiện thực`],a:`B`},
{q:`Thế giới quan là gì?`,o:[`A. Quan điểm, cách nhìn về XH`,`B. Quan điểm, cách nhìn về thế giới tự nhiên`,`C. Quan điểm, niềm tin, nhìn nhận về các sự vật cụ thể`,`D. Toàn bộ quan điểm và niềm tin định hướng hoạt động con người trong cuộc sống`],a:`D`},
{q:`Ý thức tôn giáo là niềm tin của một bộ phận nhân dân, thường là yếu tố bền vững nhất trong đời sống tinh thần của mỗi con người, của xã hội là nguyên nhân gì(?) của sự tồn tại tôn giáo?`,o:[`A. Nhận thức.`,`B. Văn hóa.`,`C. Trình độ.`,`D. Tâm lý.`],a:`D`},
{q:`Nguồn gốc vận động và phát triển của các hình thái kinh tế- xã hội là gì? Chọn một câu trả lời đúng:`,o:[`A. Sự tăng lên không ngừng của năng suất lao động.`,`B. Mâu thuẫn giai- tầng trong xã hội, sự thay đổi của quan hệ sản xuất.`,`C. Do việc giải quyết mâu thuẫn giữa lực lượng sản xuất với quan hệ sản xuất, mâu thuẫn giữa cơ sở hạ tầng với kiến trúc thượng tầng.`,`D. Quần chúng nhân dân không ngừng nổi dậy đấu tranh chống các thế lực phản động trong xã hội.`],a:`C`},
{q:`Câu trả lời sau đây, câu nào diễn đạt chưa chuẩn xác:`,o:[`A. Chủ nghĩa Mác là học thuyết do C.Mác sáng lập.`,`B. Chủ nghĩa Mác là học thuyết về sự nghiệp giải phóng giai cấp vô sản và nhân dân lao động.`,`C. Chủ nghĩa Mác là thế giới quan và phương pháp luận chung của mọi nhận thức và thực tiễn.`,`D. Chủ nghĩa mác là học thuyết được xây dựng trên cơ sở kế thừa những tinh hoa của lịch sử tư tưởng nhân loại và thực tiễn cách mạng`],a:`C`},
{q:`Phát kiến vĩ đại nhất của Các Mác trên lĩnh vực nghiên cứu triết học và kinh tế chính trị là:`,o:[`A) Sáng tạo ra chủ nghĩa duy vật biện chứng và học thuyết giá trị lao động`,`B) Sáng tạo ra phép biện chứng duy vật và học thuyết giá trị thặng dư`,`C) Sáng tạo ra chủ nghĩa duy vật biện chứng và học thuyết giá trị thặng dư`,`D) Sáng tạo ra chủ nghĩa duy vật lịch sử và học thuyết giá trị thặng dư`],a:`D`},
{q:`Trong các câu hỏi sau đây, câu hỏi nào là biến thể của cách diễn đạt vấn đề cơ bản của triết học:`,o:[`A) Não người đã phát triển như thế nào?`,`B) Nội dung của các tư tưởng của con người xuất hiện từ đâu và bằng cách nào?`,`C) Tư duy được thực hiện trong các hình thức nào và tuân theo các quy luật nào?`,`D) Mục đích và ý nghĩa của sự tồn tại người là gì?`],a:`B`},
{q:`Trong chỉ đạo thực tiễn cần căn cứ vào đâu để đề ra chủ trương, phương hướng hành động?`,o:[`A. Cái tất nhiên, bản chất, nội dung.`,`B. Cái ngẫu nhiên, hình thức, hiện tượng`,`C. Các phương án trả lời đều sai`],a:`A`},
{q:`Trong tác phẩm kinh điển nào sau đây, tác phẩm nào thể hiện tập trung việc V.I. Lênin đã kế thừa và phát triển quan niệm của chủ nghĩa Mác về vật chất, về mối quan hệ giữa vật chất và ý thức, tồn tại xã hội và ý thức xã hội:`,o:[`A) Làm gì.`,`B) Chủ nghĩa duy vật và chủ nghĩa kinh nghiệm phê phán.`,`C) Ba nguồn gốc và ba bộ phận cấu thành chủ nghĩa Mác.`,`D) Bút ký triết học.`],a:`B`},
{q:`Trong tác phẩm kinh điển nào sau đây, tác phẩm nào thể hiện tập trung việc V.I. Lênin đã kế thừa và phát triển tư tưởng biện chứng trong triết học của G.W.Ph. Hêghen?`,o:[`A) Làm gì?`,`B) Chủ nghĩa duy vật và chủ nghĩa kinh nghiệm phê phán.`,`C) Ba nguồn gốc và ba bộ phận cấu thành chủ nghĩa Mác.`,`D) Bút ký triết học.`],a:`D`},
{q:`Theo Ph. Ăngghen, vấn đề cơ bản lớn của triết học là vấn đề về:`,o:[`A) Vật chất.`,`B) Ý thức.`,`C) Mối quan hệ giữa tư duy và tồn tại.`,`D) Quy luật chung nhất của tự nhiên, xã hội và tư duy con người.`],a:`C`},
{q:`Nội dung mặt thứ nhất của vấn đề cơ bản của triết học là:`,o:[`A) Quan hệ giữa vật chất với ý thức.`,`B) Quan hệ giữa ý thức với vật chất.`,`C) Khả năng nhận thức thế giới của con người.`,`D) Bản chất của thế giới là vật chất hay ý thức.`],a:`D`},
{q:`Hệ thống triết học nào quan niệm sự vật là phức hợp của cảm giác?`,o:[`A) Chủ nghĩa duy vật siêu hình.`,`B) Chủ nghĩa duy vật biện chứng.`,`C) Chủ nghĩa duy tâm chủ quan.`,`D) Chủ nghĩa duy tâm khách quan`],a:`C`},
{q:`Hệ thống triết học nào coi cảm giác là hình ảnh chủ quan của thế giới khách quan?`,o:[`A) Chủ nghĩa duy vật biện chứng.`,`B) Chủ nghĩa duy vật siêu hình.`,`C) Chủ nghĩa duy tâm khách quan.`,`D) Chủ nghĩa duy tâm chủ quan.`],a:`A`},
{q:`Theo Ph. Ăngghen, chia vận động thành:`,o:[`A. Bốn hình thức vận động cơ bản`,`B. Năm hình thức vận động cơ bản`,`C. Sáu hình thức vận động cơ bản`,`D. Ba hình thức vận động cơ bản`],a:`B`},
{q:`Phương thức sản xuất bao gồm:`,o:[`A. Lực lượng sản xuất và quan hệ sản xuất.`,`B. Lực lượng sản xuất, quan hệ sản xuất, cơ sở hạ tầng.`,`C. Lực lượng sản xuất, quan hệ sản xuất, cơ sở hạ tầng, kiến trúc thượng tầng`],a:`A`},
{q:`Ý nghĩa định nghĩa vật chất của Lênin được thể hiện:`,o:[`A. Khẳng định tính thứ nhất của vật chất.`,`B. Cho phép xác định cái gì là vật chất trong lĩnh vực xã hội.`,`C. Các phương án trả lời đều đúng.`],a:`C`},
{q:`Chân lý có những tính chất gì?`,o:[`A. Tính khách quan, tính tuyệt đối, tính tương đối, tính hoàn chỉnh`,`B. Tính khách quan, tính tuyệt đối, tính tương đối, tính cụ thể`,`C. Tính khách quan, tính tuyệt đối, tính tương đối, tính phổ biến`],a:`B`},
{q:`Tư tưởng nôn nóng, đốt cháy giai đoạn phản ánh trực tiếp việc:`,o:[`A. Không vận dụng quy luật phủ định của phủ định`,`B. Không vận dụng đúng quy luật thống nhất và đấu tranh của các mặt đối lập`,`C. Không vận dụng đúng quy luật từ những thay đổi về lượng dẫn đến những thay đổi về chất và ngược lại`],a:`C`},
{q:`Thực tiễn là:`,o:[`A. Hoạt động vật chất có mục đích mang tính lịch sử-xã hội của con người`,`B. Hoạt động tinh thần nhằm tạo ra các giá trị thẩm mỹ`,`C. Một số hoạt động vật chất và một số hoạt động tinh thần`],a:`A`},

{q:`Theo C.Mác con người phải chứng minh chân lý trong:`,o:[`A) Hoạt động lý luận.`,`B) Hoạt động thực tiễn.`,`C) Thực tế.`,`D) Hiện thực.`],a:`B`},
{q:`Những hình thức nhận thức: Khái niệm, phán đoán, suy luận thuộc giai đoạn nhận thức nào?`,o:[`A. Nhận thức cảm tính`,`B. Nhận thức lý tính`,`C. Nhận thức thông thường`,`D. Nhận thức khoa học`],a:`B`},
{q:`Theo quan điểm của triết học Mác-Lênin, tiêu chuẩn của chân lý là gì?`,o:[`A. Tri thức do các thế hệ trước để lại`,`B. Tri thức được nhiều người công nhận`,`C. Thực tiễn`,`D. Lời nói của các vĩ nhân`],a:`C`},
{q:`V.l. Lenin khẳng định: Chủ nghĩa Mác dựa vào... chứ không phải dựa vào... để vạch ra đương lối chính trị của mình.`,o:[`A. Khả năng/ Hiện thực.`,`B. Hiện thực/ Ngẫu nhiên.`,`C. Hiện thực/ Khả năng.`,`D. Tất yếu/ Ngẫu nhiên.`],a:`C`},
{q:`Hạt thóc khi gieo xuống đất có thể nảy mầm thành cây lúa. Vậy hạt thóc là...`,o:[`A) Khả năng`,`B) Hiện thực.`,`C) Không phải Hiện thực.`,`D) Vừa là khả năng vừa là hiện thực.`],a:`D`},
{q:`V.I.Lênin cho rằng: nhận thức đi từ...đến..., từ bản chất ít sâu sắc đến bản chất sâu sắc hơn.`,o:[`A. Hình thức/ nội dung`,`B. Nội dung/ hình thức`,`C. Bản chất/ hiện tượng`,`D. Hiện tượng/ bản chất`],a:`D`},
{q:`"Bản chất chỉ là tên gọi trống rỗng mà con người tưởng tượng ra, nó không tồn tại trên thực tế". Đây là quan niệm của trường phái triết học nào?`,o:[`A. Duy tâm khách quan`,`B. Bất khả vi`,`C. Duy vật biện chứng`,`D. Duy tâm chủ quan`],a:`D`},
{q:`Trong quá trình vận động, phát triển của sự vật,... giữ vai trò quyết định...`,o:[`A. Hình thức/Nội dung`,`B. Nội dung/Hình thức`,`C. Hiện tượng/Bản chất`,`D. Ngẫu nhiên/Tất nhiên`],a:`B`},
{q:`Trong các cụm từ dưới đây, cụm từ nào được xem là"hình thức" trong cặp phạm trù"nội dung- hình thức" mà phép biện chứng duy vật nghiên cứu:"truyện kiều là..."`,o:[`A. Tác phẩm của Nguyễn Du`,`B. Tác phẩm thơ lục bát`,`C. Tác phẩm có bìa màu xanh`,`D. Tác phẩm ra đời vào thế kỷ XVIII`],a:`B`},
{q:`C.Mác và Ph.Ăngghen cho rằng: Cái mà người ta quả quyết cho là...thì lại hoàn toàn do những cái...cấu thành và cái được coi là...lại là hình thức trong đó ẩn nấp...`,o:[`A. Tất yếu/ Ngẫu nhiên; Ngẫu nhiên/ Tất yếu.`,`B. Ngẫu nhiên/ Tất yếu; Tất yếu/ Ngẫu nhiên`,`C. Tất yếu/ Ngẫu nhiên; Tất yếu/ Ngẫu nhiên.`,`D. Ngẫu nhiên/ Tất yếu; Ngẫu nhiên/ Tất yếu`],a:`A`},
{q:`"Đói nghèo" và"dốt nát", hiện tượng nào là nguyên nhân, hiện tượng nào là kết quả?`,o:[`A. Đói nghèo là nguyên nhân, dốt nát là kết quả.`,`B. Dốt nát là nguyên nhân, đói nghèo là kết quả.`,`C. Cả hai đều là nguyên nhân.`,`D. Hiện tượng này vừa là nguyên nhân vừa là kết quả của hiện tượng kia.`],a:`D`},
{q:`Có rất nhiều loại nguyên nhân như: nguyên nhân cơ bản, nguyên nhân chủ yếu, nguyên nhân bên trong, nguyên nhân bên ngoài, nguyên nhân chủ quan, nguyên nhan khách quan...điều đó chứng tỏ là...`,o:[`A) Một kết quả chỉ có thể do một loại nguyên nhân gây ra.`,`B) Một kết quả có thể do nhiều loại nguyên nhân gây ra.`,`C) Một kết quả có thể không cần nguyên nhân gây ra.`,`D) Không thể nhận thức được quan hệ nguyên nhân- kết quả`],a:`B`},
{q:`Hình thức cơ bản, đầu tiên của mọi quá trình tư duy là?`,o:[`a) Cảm giác.`,`b) Biểu tượng.`,`c) Khái niệm.`,`d) Suy luận.`],a:`C`},
{q:`Trong các cặp khái niệm dưới đây, cặp nào có quan hệ nhân quả?`,o:[`a) Đông- Tây`,`b) Nghèo- Dốt`,`c) Xuân- Hạ`,`d) Ngày- Đêm`],a:`B`},
{q:`Phạm trù là những...phản ánh những mặt, những thuộc tính, những mối liên hệ chung, cơ bản nhất của các sự vật và hiện tượng thuộc một lĩnh vực nhất định.`,o:[`a) Khái niệm.`,`b) Khái niệm rộng.`,`c) Khái niệm rộng nhất.`,`d) Khái niệm hẹp.`],a:`C`},
{q:`Nội dung của các phạm trù luôn luôn mang tính...`,o:[`a) Khách quan`,`b) Chủ quan`,`c) Chân thực`,`d) Khách quan và chủ quan`],a:`A`},
{q:`Quan niệm nào cho rằng cơ sở của mối liên hệ giữa các sự vật, hiện tượng là ở"ý niệm tuyệt đối"?`,o:[`a) Chủ nghĩa duy tâm.`,`b) Chủ nghĩa duy tâm chủ quan.`,`c) Chủ nghĩa duy tâm khách quan.`,`d) Chủ nghĩa duy vật.`],a:`C`},
{q:`Yêu cầu của quan niệm toàn diện phải xem xét tất cả các mối liên hệ của sự vât. Yêu cầu này không thực hiện được nhưng vẫn phải đề ra để làm gì? (NHUNG HOÀNG)`,o:[`a) Chống quan điểm siêu hình.`,`b) Chống quan điểm duy tâm.`,`c) Chống quan chủ nghĩa triết chung và thuyết ngụy biện.`,`d) Đề phòng cho chúng ta khỏi phạm sai lầm và sự cứng nhắc.`],a:`D`},
{q:`Biện chứng chủ quan là gì?(NHUNG HOÀNG)`,o:[`a) Là biện chứng của tư duy tư biện, thuần túy.`,`b) Là biện chứng của ý thức.`,`c) Là biện chứng của thực tiễn xã hội.`,`d) Là biện chứng của lý luận.`],a:`B`},
{q:`Biện chứng khách quan là gì?`,o:[`a) Là những quan niệm biện chứng tiên nghiệm, có trước kinh nghiệm.`,`b) Là những quan niệm biện chứng được rút ra từ ý niệm tuyệt đối, độc lập với ý thức con người.`,`c) Là biện chứng của các tồn tại vật chất.`,`d) Là biện chứng không thể nhận thức được nó.`],a:`C`},
{q:`Tại sao C.Mác nói phép biện chứng của G.W.Ph.Hêghen là phép biện chứng lộn đầu xuống đất?`,o:[`a) Thừa nhận sự tồn tại khách quan của thế giới vật chất.`,`b) Thừa nhận tinh thần là sản phẩm của thế giới vật chất.`,`c) Thừa nhận sự tồn tại độc lập của tinh thần.`,`d) Thừa nhận tự nhiên, xã hội là sản phẩm của quá trình phát triển của tinh thần, ý niệm.`],a:`D`},
{q:`Nguồn gốc xã hội trực tiếp và quan trọng nhất quyết định sự ra đời và phát triển của ý thức là:`,o:[`a) Lao động trí óc.`,`b) Thực tiễn.`,`c) Giáo dục.`,`d) Nghiên cứu khoa học.`],a:`B`},
{q:`Nhân tố cơ bản, trực tiếp tạo thành nguồn gốc xã hội của ý thức:`,o:[`a) Lao động và ngôn ngữ.`,`b) Lao động trí óc và lao động chân tay.`,`c) Thực tiễn kinh tế và lao động.`,`d) Lao động và nghiên cứu khoa học.`],a:`A`},
{q:`Sai lầm của các nhà triết học cổ đại trong quan niệm về vật chất?`,o:[`A. Đồng nhất vật chất với một số dạng vật thể cụ thể, cảm tính.`,`B. Vật chất là tất cả cái tồn tại khách quan.`,`C. Vật chất là có thể nhận thức được.`,`D. Vật chất tự thân vận động.`],a:`A`},
{q:`Khái niệm trung tâm mà V.I. Lênin sử dụng để định nghĩa về vật chất là?`,o:[`A. Phạm trù triết học.`,`B. Thực tại khách quan.`,`C. Cảm giác.`,`D. Phản ánh.`],a:`B`},
{q:`"Tất cả cái gì đang vận động, đều vận động nhờ một cái khác nào đó". Nhận định này gắn liền với hệ thống triết học nào? Hãy chọn phương án sai?`,o:[`a) Triết học duy vật.`,`b) Triết học duy tâm.`,`c) Triết học duy tâm khách quan.`,`d) Triết học duy tâm chủ quan.`],a:`A`},
{q:`Phép biện chứng của triết học Hêghen là: (Kiểu hỏi khác: Phép biện chứng của Hêghen là phép biện chứng gì?)`,o:[`a) Phép biện chứng duy tâm chủ quan.`,`b) Phép biện chứng duy vật hiện đại.`,`c) Phép biện chứng ngây thơ, chất phác.`,`d) Phép biện chứng duy tâm khách quan.`],a:`D`},
{q:`Nhận định sau thuộc lập trường triết học nào?"Nhân tố kinh tế là nhân tố quyết định duy nhất trong lịch sử".`,o:[`a) Chủ nghĩa duy vật biện chứng.`,`b) Chủ nghĩa duy tâm chủ quan.`,`c) Chủ nghĩa duy tâm khách quan.`,`d) Chủ nghĩa duy vật tầm thường.`],a:`D`},
{q:`Chọn luận điểm thể hiện lập trường triết học duy tâm lịch sử:`,o:[`a) Quan hệ sản xuất mang tính vật chất.`,`b) Yếu tố kinh tế quyết định lịch sử.`,`c) Sự vận động và phát triển của xã hội, suy cho cùng là do tư tưởng của con người quyết định.`,`d) Kiến trúc thượng tầng chỉ đóng vai trò thụ động trong lịch sử.`],a:`C`},
{q:`Triết học trong xã hội có giai cấp được hiểu như thế nào?(NHUNG HOÀNG)`,o:[`A. Cũng có tính giai cấp`,`B. Không có tính giai cấp`,`C. Chỉ triết học phương Tây mới có tính giai cấp`,`D. Chỉ có triết học phương Đông mới có tính giai cấp`],a:`A`},
{q:`Động lực của cách mạng xã hội là`,o:[`A. Giai cấp chân chính`,`B. Giai cấp tiến tiên`,`C. Giai cấp chiếm số đông`],a:`B`},
{q:`Quan hệ cung cầu thuộc khâu nào của quá trình tái sản xuất xã hội?`,o:[`A. Sản xuất và tiêu dùng`,`B. Phân phối và trao đổi`,`C. Tiêu dùng`],a:`A`},
{q:`Trong thực tế chúng ta phải dựa vào khả năng hay hiện thực`,o:[`A. Khả năng`,`B. Hiện thực`,`C. Các phương án trả lời đều sai`],a:`B`},
{q:`Xét về giá trị của hàng hóa, hàng hóa càng khan hiếm thì`,o:[`A. Giá trị của nó càng cao`,`B. Giá cả của nó càng cao`,`C. Cả giá trị và giá cả của hàng hóa càng cao`],a:`B`},
{q:`Đặc điểm lớn nhất của thời kỳ quá độ lên chủ nghĩa xã hội ở nước ta là`,o:[`A. Có nhiều thành phần kinh tế đan xen nhau`,`B. Từ một nền sản xuất nhỏ là phổ biến quá độ lên chủ nghĩa xã hội không qua chế độ tư bản chủ nghĩa`,`C. Năng suất lao động thấp`],a:`B`},
{q:`Kết cấu của tồn tại xã hội bao gồm?`,o:[`A. Phương thức sản xuất, điều kiện dân số, điều kiện tự nhiên địa lý`,`B. Phương thức sản xuất, phương thức tiêu dùng, phương thức trao đổi hàng hóa`,`C. Phương thức sản xuất, điều kiện dân số, cơ sở hạ tầng xã hội`],a:`A`},
{q:`Thêm cụm từ thích hợp vào chỗ trống của câu sau để được luận điểm của chủ nghĩa duy vật biện chứng về tính chất của các phạm trù: Nội dung của phạm trù có tính..(1)..., hình thức của phạm trù có tính...(2)...`,o:[`A. 1- chủ quan, 2- khách quan`,`B. 1- chủ quan, 2- chủ quan.`,`C. 1- khách quan, 2- chủ quan.`,`D. 1- khách quan, 2- khách quan`],a:`C`},
{q:`Vật chất với tư cách là phạm trù triết học đã có lịch sử phát triển khoảng bao nhiêu năm(NHUNG HOÀNG)`,o:[`A. 2500 năm`,`B. 3000 năm`,`C. 3500 năm`,`D. 4000 năm`],a:`A`},
{q:`Khái niệm"bước nhảy"?(NHUNG HOÀNG)`,o:[`A. Sự đột biến`,`B. Chuyển dần về chất`,`C. Hoàn thiện chất`,`D. Quá trình biến đổi về chất diễn ra tại điểm nút`],a:`D`},
{q:`Những chức năng nào của tiền tệ đòi hỏi phải có tiền vàng?`,o:[`A. Tất cả các chức năng của tiền tệ`,`B. Chỉ có chức năng thuộc đo giá trị`,`C. Chức năng thước đo giá trị, chức năng tích lũy và chức năng cất trữ`,`D. Chức năng thước đo giá trị chức năng tích lũy, cất trữ và chức năng tiền tệ thế giới`],a:`D`},
{q:`Cuộc cách mạng xã hội chủ nghĩa đầu tiên trên thế giới là`,o:[`A. Cách mạng tháng Tám`,`B. Cách mạng tháng Mười Nga`,`C. Cách mạng Tân Hợi`],a:`B`},
{q:`Tiền tệ có mấy chức năng?`,o:[`A. Ba chức năng`,`B. Năm chức năng`,`C. Sáu chức năng`,`D. Bảy chức năng`],a:`B`},
{q:`Lượng giá trị của đơn vị hàng hoá thay đổi`,o:[`A. Tỷ lệ nghịch với năng suất lao động, không phụ thuộc vào cường độ lao động.`,`B. Tỷ lệ thuận với năng suất lao động`,`C. Tỷ lệ nghịch với cường độ lao động`],a:`A`},
{q:`Giá trị cá biệt của hàng hoá do`,o:[`A. Hao phí lao động cá biệt của người sản xuất quyết định`,`B. Hao phí lao động cá biệt của người sản xuất nhiều hàng hoá quyết định`,`C. Hao phí lao động của ngành quyết định`],a:`A`},
{q:`Hai phương pháp sản xuất giá trị thặng dư là`,o:[`A. Sản xuất giá trị thặng dư tương đối và siêu ngạch`,`B. Sản xuất giá trị thặng dư tuyệt đối và tương đối`,`C. Sản xuất giá trị thặng dư tuyệt đối và siêu nghạch`],a:`B`},
{q:`Thuật ngữ giai cấp công nhân và giai cấp vô sản`,o:[`A. Đồng nghĩa`,`B. Khác nghĩa`,`C. Không liên quan về nghĩa`],a:`A`},
{q:`Những nhận xét dưới đây về phương pháp sản xuất giá trị thặng dư tuyệt đối, nhận xét nào là không đúng?`,o:[`A. Chủ yếu áp dụng ở giai đoạn đầu của CNTB khi kỹ thuật còn thủ công lạc hậu.`,`B. Giá trị sức lao động không thay đổi.`,`C. Ngày lao động không thay đổi.`],a:`C`},
{q:`Biện chứng là phương pháp`,o:[`A. Thấy cái chung mà không thấy cái riêng`,`B. Thấy cái riêng mà không thấy cái chung`,`C. Vừa thấy cái chung và cái riêng`,`D. Vừa thấy cái chung, vừa thấy cái riêng và cái đơn nhất`],a:`C`},
{q:`Đặc điểm của quy luật triết học mang tính`,o:[`A. Chung nhất, khái quát nhất về thế giới`,`B. Cụ thể nhất, chi tiết nhất về thế giới`,`C. Toàn diện nhất, sâu sắc nhất về thế giới`],a:`A`},
{q:`Phân công lao động xã hội`,o:[`A. Là một trong những nguyên nhân hình thành chủ nghĩa tư bản độc quyền`,`B. Không dẫn đến sự hình thành tư bản độc quyền`,`C. Nguyên nhân hình thành chủ nghĩa tư bản`,`D. Là một trong những nguyên nhân hình thành chủ nghĩa tư bản độc quyền nhà nước`],a:`A`},
{q:`Triết học bao gồm những quan điểm chung nhất, những sự lý giải có luận chứng cho các câu hỏi chung của con người, nên triết học bao gồm toàn bộ tri thức của nhân loại. Kết luận trên ứng với triết học thời kỳ nào? Chọn câu trả lời đúng.`,o:[`A. Triết học cổ đại`,`B. Triết học phục hưng`,`C. Triết học Trung cổ- Tây âu`,`D. Triết học Mác- Lênin`],a:`A`},

{q:`Biện chứng là phương pháp của khoa học nào sau đây`,o:[`a. Triết học`,`b. Đạo đức học`,`c. Chính trị học`],a:`a`},
{q:`Giữa phạm trù triết học và phạm trù của các khoa học khác có mối quan hệ biện chứng với nhau. Mối quan hệ đó là`,o:[`a. Quan hệ giữa bản chất và hiện tượng`,`b. Quan hệ giữa cái chung và cái riêng`,`c. Quan hệ giữa nội dung và hình thức`],a:`b`},
{q:`Sự vật mới ra đời bao giờ cũng trên cơ sở những cái đã có của sự vật cũ, qua đó tiến hành chọn lọc những cái tích cực, tiến bộ, phù hợp để tiếp tục phát triển. Điều này thể hiện tính chất gì của sự phát triển`,o:[`a. Tính kế thừa`,`b. Tính lặp đi lặp lại`,`c. Tính tiến lên`],a:`a`},
{q:`Mác đã kế thừa"hạt nhân hợp lý" trong triết học của ông để xây dựng phép biện chứng duy vật. Ông là ai? (Học hiểu câu hỏi để trả lời câu: Hạt nhân hợp lý của thế giới quan khoa học là chủ nghĩa nào?)`,o:[`A. Phơ bách`,`B. Platon`,`C. Hêghen`],a:`C`},
{q:`Theo sự phát triển của xã hội, thứ tự phát triển của các hình thức cộng đồng trong lịch sử là`,o:[`a. Thị tộc- Bộ lạc- Bộ tộc- Dân tộc`,`b. Thị tộc- Bộ tộc- Bộ lạc- Dân tộc`,`c. Dân tộc- Thị tộc- Bộ lạc- Bộ tộc`],a:`a`},
{q:`Theo quan điểm của Triết học Mác-Lênin, có thể định nghĩa về vật chất như sau:`,o:[`a. Vật chất là những chất tạo nên vũ trụ`,`b. Vật chất là tồn tại khách quan`,`c. Vật chất là thực tại khách quan`],a:`c`},
{q:`Vật chất là tất cả những gì`,o:[`a. Tồn tại một cách cụ thể, có thể nhìn thấy`,`b. Tồn tại vô hình, thần bí ở bên ngoài thế giới khách quan`,`c. Tồn tại ở bên ngoài ý thức, được ý thức con người phản ánh`,`d. Tồn tại vô hình, không thể nhìn thấy`],a:`c`},
{q:`Vấn đề cơ bản của triết học là`,o:[`a. Quan hệ giữa vật chất và ý thức`,`b. Quan hệ giữa khách quan và chủ quan`,`c. Quan hệ giữa thực tiễn và lí luận`],a:`a`},
{q:`Kết cấu của ý thức theo chiều dọc thì bao gồm`,o:[`a. Tự ý thức, tiềm thức, vô thức`,`b. Tự ý thức, tri thức, tiềm thức, vô thức`,`c. Các phương án trả lời đều sai`],a:`a`},
{q:`Định nghĩa vật chất của Lênin được viết trong tác phẩm:`,o:[`a. Bút ký triết học`,`b. Chủ nghĩa duy vật và chủ nghĩa kinh nghiệm phê phán`,`c. Chủ nghĩa đế quốc- giai đoạn tột cùng của chủ nghĩa tư bản`,`d. Làm gì?`],a:`b`},
{q:`Nền tảng lý luận của chủ nghĩa Mác-Lênin là(NHUNG HOÀNG)`,o:[`a. Triết học`,`b. Kinh tế chính trị học`,`c. Chủ nghĩa xã hội khoa học`],a:`a`},
{q:`Bản chất của triết học duy tâm như thế nào(NHUNG HOÀNG)`,o:[`a. Đi ngược lại với khoa học`,`b. Không hoàn toàn phản khoa học`,`c. Rất khoa học`],a:`b`},
{q:`Quan điểm nào sau đây đúng nhất(NHUNG HOÀNG)`,o:[`a. Phạm trù là những thực thể ý niệm, tồn tại bên ngoài và độc lập với ý thức.`,`b. Phạm trù là những từ trống rỗng, do con người tưởng tượng ra, không biểu hiện một cái gì của hiện thực.`,`c. Phạm trù là kết quả của quá trình nhận thức, là hình ảnh chủ quan của thế giới khách quan.`],a:`c`},
{q:`Tất nhiên là phạm trù triết học dùng để chỉ`,o:[`a. Những gì đang tồn tại và phát triển`,`b. Những gì sẽ xuất hiện do nguyên nhân bên trong quyết định`,`c. Những gì sẽ xuất hiện trong thực tế`],a:`b`},
{q:`Quan điểm nào cho rằng sự phát triển chỉ là sự tăng, giảm đơn thuần về mặt lượng, không có sự thay đổi về chất`,o:[`a. Quan điểm duy vật`,`b. Quan điểm duy tâm`,`c. Quan điểm siêu hình`],a:`c`},
{q:`Thuộc tính cơ bản được Lênin rút ra trong định nghĩa phạm trù vật chất là`,o:[`a. Thực tại khách quan`,`b. Thực tế khách quan`,`c. Tồn tại khách quan`],a:`a`},
{q:`Chủ nghĩa Mác-Lênin ra đời vào khoảng thời gian nào`,o:[`a. Giữa thế kỷ XIX`,`b. Đầu thế kỷ XIX`,`c. Đầu thế kỷ XX`,`d. Cuối thế kỷ XIX`],a:`a`},
{q:`Cặp phạm trù nguyên nhân, kết quả chỉ ra(073-356-8678) (Kiểu hỏi khác: Tính chất phong phú, đa dạng trong quan hệ nhân quả thể hiện ở chỗ một kết quả có thể do:)`,o:[`a. Một kết quả có thể được tạo ra bởi nhiều nguyên nhân khác nhau`,`b. Một kết quả chỉ được tạo ra bởi một nguyên nhân cơ bản`,`c. Các phương án trả lời đều sai`],a:`a`},
{q:`Theo Ăng-ghen, có thể chia vận động thành:`,o:[`a. Bốn hình thức vận động cơ bản`,`b. Năm hình thức vận động cơ bản`,`c. Sáu hình thức vận động cơ bản`],a:`b`},
{q:`Mối liên hệ nhân quả có các tính chất cơ bản nào sau đây`,o:[`a. Tính khách quan, tính phổ biến, tính đa dạng.`,`b. Tính khách quan, tính phổ biến, kế thừa.`,`c. Tính khách quan, tính phổ biến, tính tất yếu.`],a:`c`},
{q:`Phạm trù triết học nào dùng để chỉ tính quy định khách quan vốn có của sự vật và hiện tượng, sự thống nhất hữu cơ của các thuộc tính làm cho nó là nó mà không phải là cái khác`,o:[`a. Bước nhảy`,`b. Lượng`,`c. Chất`],a:`c`},
{q:`Khẳng định nào sau đây là đúng?`,o:[`a. Mỗi sự vật cụ thể được đặc trưng bằng nhiều hình thức vận động`,`b. Hình thức vận động cao luôn bao hàm các hình thức vận động thấp, nhưng không có chiều ngược lại`,`c. Có sự vật không vận động`,`d. Có thể quy hình thức vận động cao về hình thức vận động thấp và ngược lại`],a:`b`},
{q:`Chọn phương án phản ánh quan điểm Mác-Lênin`,o:[`a. Trong giới hạn của độ, lượng của sự vật thay đổi nhưng chất của sự vật chưa thay đổi cơ bản`,`b. Trong giới hạn của độ, sự thay đổi về lượng hoàn toàn không làm ảnh hưởng tới sự thay đổi chất của sự vật`,`c. Bước nhảy là sự thay đổi về lượng của sự vật`,`d. Sự thay đổi về lượng sẽ làm thay đổi ngay lập tức chất của sự vật`],a:`a`},
{q:`Quan điểm toàn diện yêu cầu`,o:[`a. Phải xem xét tất cả các mối liên hệ, đồng thời phân loại được vị trí, vai trò của các mối liên hệ.`,`b. Xem xét tất cả các mối liên hệ, lấy mối liên hệ thứ yếu làm mối liên hệ chủ yếu, không cơ bản làm cơ bản.`,`c. Xem xét tất cả các mối liên hệ và coi vị trí, vai trò của các mối liên hệ đó là như nhau.`,`d. Chỉ xem xét những mối liên hệ đóng vai trò quyết định sự tồn tại và phát triển của sự vật.`],a:`a`},
{q:`Vật chất là tất cả những gì`,o:[`a. Chỉ có một thế giới duy nhất là thế giới vật chất`,`b. Mọi bộ phận của thế giới vật chất đều liên hệ chuyển hóa lẫn nhau`,`c. Thế giới vật chất tồn tại vĩnh viễn, khách quan, vô hạn, vô tận, không do ai sinh ra và không mất đi`,`d. Thế giới vật chất bao gồm những bộ phận riêng biệt nhau`],a:`c`},
{q:`Chọn phương án đúng theo quan điểm của triết học Mác Lênin`,o:[`a. Mâu thuẫn biện chứng là sự liên hệ, tác động qua lại giữa các mặt đối lập`,`b. Trong tư duy không có mâu thuẫn biện chứng`,`c. Cứ hai mặt đối lập là tạo thành một mâu thuẫn biện chứng`,`d. Mâu thuẫn biện chứng trong tư duy độc lập với mâu thuẫn trong hiện thực`],a:`a`},
{q:`Chọn phương án đúng theo quan điểm triết học Mác- Lênin`,o:[`a. Lượng của sự vật luôn được diễn tả bằng những con số chính xác`,`b. Có những lượng không biểu thị yếu tố nào của sự vật`,`c. Mỗi sự vật chỉ có một lượng`,`d. Có những lượng biểu thị yếu tố quy định kết cấu bên trong sự vật`],a:`d`},
{q:`Quy luật bao giờ cũng mang tính:`,o:[`A. Khách quan`,`B. Chủ quan`,`C. Cả khách quan và chủ quan`,`D. Phụ thuộc vào ý thức con người`],a:`A`},
{q:`Luận điểm nào sau đây là đúng?`,o:[`a. Chất mới của sự vật ra đời không tác động trở lại lượng của sự vật`,`b. Chất mới ra đời chỉ làm thay đổi kết cấu nhưng không làm thay đổi quy mô, trình độ, nhịp điệu của sự vận động và phát triển của sự vật`,`c. Chất mới ra đời có thể làm thay đổi kết cấu, quy mô, trình độ, nhịp điệu của sự vận động và phát triển của sự vật`,`d. Chất mới ra đời chỉ làm thay đổi quy mô, trình độ, nhịp điệu của sự vận động và phát triển của sự vật nhưng không làm thay đổi kết cấu của sự vật`],a:`c`},
{q:`Tính quy định nói lên quy mô, trình độ phát triển của sự vật gọi là gì?`,o:[`a. Bước nhảy`,`b. Độ`,`c. Lượng`,`d. Chất`],a:`c`},
{q:`Yếu tố cách mạng nhất trong lực lượng sản xuất là:`,o:[`a. Phương tiện lao động`,`b. Người lao động`,`c. Đối tượng lao động`,`d. Công cụ lao động`],a:`d`},
{q:`Cách thức của sự phát triển là(NHUNG HOÀNG)`,o:[`a. Đấu tranh của các mặt đối lập để giải quyết mâu thuẫn`,`b. Sự thay đổi về lượng dẫn đến sự thay đổi về chất và ngược lại`,`c. Hai lần phủ định`],a:`b`},
{q:`Quy luật xã hội nào giữ vai trò quyết định nhất đối với sự vận động, phát triển của xã hội?`,o:[`a. Quy luật tồn tại xã hội quyết định ý thức xã hội`,`b. Quy luật về sự phù hợp của quan hệ sản xuất với trình độ phát triển của lực lượng sản xuất`,`c. Quy luật đấu tranh giai cấp`,`d. Quy luật cơ sở hạ tầng quyết định kiến trúc thượng tầng`],a:`b`},
{q:`Nguồn gốc lý luận trực tiếp của triết học Mác là`,o:[`a. Triết học Hy Lạp cổ đại`,`b. Triết học cổ điển Đức`,`c. Triết học tây Âu trung cổ`],a:`b`},
{q:`Theo triết học Mác-Lênin, khẳng định nào sau đây là đúng? (Kiểu hỏi khác: Theo quan điểm của Triết học Mác-Lênin, ý thức là hình ảnh chủ quan của yếu tố nào sau đây?)`,o:[`a. Ý thức là sự phản ánh hiện thực khách quan theo nhu cầu nhận thức của con người`,`b. Ý thức là hình ảnh chủ quan của thế giới khách quan, là tinh thần so với thế giới vật chất.`,`c. Ý thức con người mang tính năng động sáng tạo lại hiện thực theo nhu cầu của nhận thức.`,`d. Ý thức là quá trình phản ánh hiện thực khách quan vào trong bộ óc con người một cách đơn giản, nguyên xi`],a:`b`},
{q:`Luận điểm nào sau đây là đúng?`,o:[`a. Nguyên nhân giống nhau tác động trong những điều kiện giống nhau cũng có thể đưa đến kết quả khác nhau`,`b. Nguyên nhân khác nhau tác động trong những điều kiện như nhau luôn đưa đến kết quả như nhau`,`c. Nguyên nhân tác động trong những điều kiện và hoàn cảnh càng ít khác nhau bao nhiêu thì kết quả do chúng gây ra càng giống nhau bấy nhiêu`,`d. Nguyên nhân giống nhau tác động trong những điều kiện khác nhau có thể đưa đến kết quả như nhau`],a:`c`},
{q:`Chọn phương án phản ánh quan điểm của chủ nghĩa duy tâm`,o:[`A. Ý thức là thực thể độc lập, sáng tạo ra vật chất`,`b. Ý thức là sự phản ánh nguyên xi hiện thực khách quan vào bộ óc con người.`,`c. Ý thức là sự phản ánh năng động, sáng tạo hiện thực khách quan vào bộ óc con người`,`d. Ý thức là sự phản ánh thụ động hiện thực khách quan vào bộ óc con người.`],a:`a`},
{q:`Khẳng định nào sau đây là đúng?`,o:[`a. Có sự vật không vận động`,`b. Hình thức vận động cao luôn bao hàm các hình thức vận động thấp, nhưng không có chiều ngược lại`,`c. Mỗi sự vật cụ thể được đặc trưng bằng nhiều hình thức vận động`,`d. Có thể quy hình thức vận động cao về hình thức vận động thấp và ngược lại`],a:`b`},
{q:`Luận điểm nào không phải là câu trả lời của chủ nghĩa Mác-lênin về tính thống nhất vật chất của thế giới?`,o:[`a. Mọi bộ phận của thế giới vật chất đều liên hệ chuyển hóa lẫn nhau`,`b. Chỉ có một thế giới duy nhất là thế giới vật chất`,`c. Thế giới vật chất tồn tại vĩnh viễn, khách quan, vô hạn, vô tận, không do ai sinh ra và không mất đi`,`d. Thế giới vật chất bao gồm những bộ phận riêng biệt nhau`],a:`d`},
{q:`"Cái cối xay quay bằng tay đưa lại xã hội có lãnh chúa phong kiến, cái cối xay chạy bằng máy hơi nước đưa xã hội có nhà tư bản công nghiệp". Thí dụ có hình ảnh trên nhằm nêu bật vai trò quyết định, xét đến cùng, trị sự phát triển là yếu tố nào?`,o:[`A. Đối tượng lao động`,`B. Lực lượng sản xuất`,`C. Tư liệu sản xuất`,`D. Công cụ lao động`],a:`D`},
{q:`Mỗi sự vật trong điều kiện xác định.`,o:[`A. Chỉ có một thuộc tính xác định`,`B. Có một số thuộc tỉnh xác định`,`C. Có vô văn thuộc tỉnh xác định`,`D. Có một hoặc một số thuộc tỉnh xác định`],a:`D`},
{q:`Theo quan điểm của chủ nghĩa duy vật lịch sử, ý kiến sau đây đúng hay sai? Vì sao? "Điều kiện sinh hoạt vật chất của xã hội biến đổi đến đâu thì ngay lập tức tâm lý xã hội và hệ tư tưởng xã hội cũng lập tức biến đổi đến đó"`,o:[`A. Đúng. Vì tồn tại xã hội nào thì ý thức xã hội đó`,`B. Đúng. Vì ý thức xã hội chỉ là sự phản ánh tồn tại xã hội`,`C. Sai. Vì ý thức xã hội phụ thuộc vào tồn tại xã hội nhưng nó có tính độc lập tương đối của nó`,`D. Sai. Vì thực tế lịch sử cho thấy không phải như vậy`],a:`C`},
{q:`"Phải giải thích ý thức xã hội bằng những mâu thuẫn, những sự xung đột hiện có giữa các lực lượng sản xuất những quan hệ sản xuất của xã hội". Luận điểm này nhấn mạnh điểm nào trong quan niệm của chủ nghĩa di vật lịch sử?`,o:[`A. Vai trò chi phối của phương thức sản xuất đối với ý thức xã hội`,`B. Vai trò của cơ sở hạ tầng đối với kiến trúc thượng tầng`,`C. Vai trò quyết định của ý thức xã hội đối với tồn tại xã hội`,`D. Vai trò quyết định của tồn tại xã hội đối với ý thức xã hội`],a:`A`},
{q:`Triết học trở thành"nữ tì" của thần học khi nào?(NHUNG HOÀNG)`,o:[`A. Khi quyền lực của Nhà thờ, kinh viện bao trùm mọi lĩnh vực đời sống xã hội`,`B. Khi quyền lực của Thánh chủ bao trùm mọi lĩnh vực đời sống xã hội`,`C. Khi quyền lực của Giáo hội bao trùm mọi lĩnh vực đời sống xã hội`,`D. Khi quyền lực của nhà vua kém quyền lực giáo phái`],a:`C`},
{q:`Theo quan niệm của chủ nghĩa duy vật lịch sử, yếu tố nào giữ vai trò đặc trưng cho chế độ kinh tế của một xã hội nhất định?`,o:[`A. Quan hệ sản xuất mới`,`B. Quan hệ sản xuất thống trị`,`C. Quan hệ sản xuất mạnh nhất`,`D. Quan hệ sản xuất đương thời`],a:`B`},
{q:`Vận dụng Triết học vào thực tế phải dựa trên quan điểm:`,o:[`A. Lịch sử cụ thể`,`B. Phát triển`,`C. Kế thừa`,`D. Tất cả các đáp án đều đúng`],a:`A`},
{q:`Từ định nghĩa con người của Ph.Ăngghen, đặc điểm nào sau đây cho thấy con người khác với động vật?`,o:[`A. Biết tư duy`,`B. Biết ứng xử theo các quy phạm đạo đức`,`C. Chính trị`,`D. Biết chế tạo và sử dụng công cụ lao động`],a:`D`},
{q:`Triết học coi vật chất và tinh thần cùng quyết định nguồn gốc và sự tồn tại của thế giới như nhau gọi là`,o:[`A. Triết học duy vật`,`B. Triết học duy tâm`,`C. Triết học nhị nguyên`],a:`C`},
{q:`Theo quan điểm của chủ nghĩa duy vật lịch sử thì`,o:[`A. Con người là chủ thể tùy ý sáng tạo ra lịch sử`,`B. Lịch sử sáng tạo ra con người, con người không thể sáng tạo ra lịch sử`,`C. Con người không thể sáng tạo ra lịch sử mà chỉ có thể thích ứng với những điều kiện có sẵn`,`D. Con người sáng tạo ra lịch sử trong phạm vi những điều kiện khách quan mà chính lịch sử trước đó đã tạo nên cho nó`],a:`D`},
{q:`Vai trò của cách mạng xã hội đối với tiến hóa xã hội gì?`,o:[`A. Cách mạng xã hội làm gián đoạn quá trình tiến hóa xã hội`,`B. Cách mạng xã hội phủ định tiến hóa xã hội`,`C. Cách mạng xã hội không có quan hệ với tiến hóa xã hội`,`D. Cách mạng xã hội mở đường cho quá trình tiến hoá xã hội lên giai đoạn cao hơn.`],a:`D`},
{q:`Khái niệm"những nguyên lý cơ bản của chủ nghĩa Mác- Lênin" là chỉ`,o:[`A. Những quan điểm cơ bản của chủ nghĩa Mác- Lênin`,`B. Những quan điểm cơ bản, nền tảng của chủ nghĩa Mác- Lênin`,`C. Những quan điểm mang tính chất chân lý bền vững của chủ nghĩa Mác- Lênin`,`D. Những quan điểm cơ bản, nền tảng và có tính chất chân lý bền vững của chủ nghĩa Mác- Lênin`],a:`D`},
{q:`Về cấu trúc, người lao động thuộc mặt nào trong một phương thức sản xuất?`,o:[`A. Kinh tế- giai cấp`,`B. Lực lượng sản xuất`,`C. Tư liệu sản xuất`,`D. Kiến trúc thượng tầng`],a:`B`},
{q:`Theo C. Mác, vấn đề tìm hiểu xem tư duy của con người có thể đạt được chân lý khách quan toàn không phải là vấn đề lý luận mà là vấn đề gì?`,o:[`A. Thực tế`,`B. Hiện thực`,`C. Thực tiễn`,`D. Khoa học`],a:`C`},
{q:`Nguồn gốc kinh tế của sự vận động và phát triển của hình thái kinh tế- xã hội là gì?`,o:[`A. Mâu thuẫn giai cấp gay gắt trong xã hội có giai cấp`,`B. Sự tăng lên không ngừng của năng suất lao động`,`C. Mâu thuẫn giữa lực lượng sản xuất với quan hệ sản xuất`,`D. Sự phát triển mạnh mẽ, đột phá của khoa học kỹ thuật công nghệ`],a:`C`},
{q:`Trong hoạt động nhận thức, cần nhìn nhận sự vật trong trạng thái vận động và phát triển. Điều đó dựa trên các sở lý luận của nguyên lý nào?`,o:[`A. Nguyên lý về mối liên hệ phổ biến`,`B. Nguyên lý về sự phát triển`,`C. Nguyên lý về tính thống nhất vật chất của thế giới`],a:`B`},
{q:`Nguồn gốc trực tiếp của sự ra đời giai cấp trong xã hội?`,o:[`A. Do sự phát triển lực lượng sản xuất làm xuất hiện"của dư" tương đối`,`B. Do sự chênh lệch về khả năng giữa các tập đoàn người`,`C. Do sự phân hóa giữa giàu và nghèo trong xã hội`,`D. Do sự xuất hiện chế độ tư hữu về tư liệu sản xuất`],a:`D`},
{q:`Sai lầm của các nhà duy vật chất phác thời cổ đại là gì?`,o:[`A. Đồng nhất vật chất với vật thể`,`B. Đồng nhất vật thể với bản thân nó`,`C. Đồng nhất vật chất duy vật và thế giới duy tâm`,`D. Không có đáp án nào đúng`],a:`A`},
{q:`Ý thức xã hội là phạm trù triết học dùng để chỉ(NHUNG HOÀNG)`,o:[`A. Toàn bộ đời sống tinh thần của xã hội`,`B. Toàn bộ điều kiện vật chất của xã hội`,`C. Toàn bộ điều kiện tinh thần của xã hội`,`D. Toàn bộ đời sống nói chung của xã hội`],a:`A`},
{q:`Theo quan điểm của chủ nghĩa Mác-Lênin,"Bộ tộc" được định nghĩa là gì? (NHUNG HOÀNG)`,o:[`A. Bộ tộc là hình thức cộng đồng người hình thành khi xã hội có sự phân chia thành giai cấp. Các bộ tộc được hình thành từ sự liên kết của nhiều bộ lạc sống trên một lãnh thổ nhất định`,`B. Những tộc người sống lưu vong`,`C. Nhiều bộ lạc hợp lại`,`D. Những người có chung lãnh thổ, ngôn ngữ, văn hóa, kinh tế`],a:`A`},
{q:`Theo quan điểm của chủ nghĩa duy vật lịch sử, nhà nước là yếu tố cơ bản trong kiến trúc thượng tầng của xã hội, nó:`,o:[`A. Luôn luôn có tác động tích cực đối với cơ sở hạ tầng`,`B. Luôn luôn có tác động tiêu cực đối với cơ sở hạ tầng`,`C. Có thể tác động tích cực hoặc tiêu cực, tùy theo từng điều kiện nhất định`,`D. Không có tác dụng gì tối cơ sở hạ tăng kinh tế mà chỉ có tác dụng tối các yếu tố khắc trong bản thân hệ thông kiến trức thượng tầng`],a:`C`},
{q:`Phạm trù triết học phản ánh thời kỳ hình thành đối tượng, khi nó mới chỉ tồn tại dưới dạng tiền đề hay với tư cách là xu hướng gọi là gì?`,o:[`A. Nguyên nhân`,`B. Kết quả`,`C. Khả năng`,`D. Hiện thực`],a:`C`},
{q:`Đâu là một trong những tác phẩm của Lênin?`,o:[`A. Chủ nghĩa xã hội không tưởng Pháp`,`B. Chủ nghĩa Duy vật và chủ nghĩa kinh viện phê phán`,`C. Chủ nghĩa Duy vật và chủ nghĩa kinh nghiệm phê phán`,`D. Đường Kách Mệnh`],a:`C`},
{q:`Theo triết học Mác, con người là gì?`,o:[`A. Thực thể sinh học- xã hội`,`B. Thực thể tự nhiên- sinh học`,`C. Kết hợp con vật và con người`,`D. Là thực thể do thánh thần tạo ra`],a:`A`},
{q:`Khi xem xét, đánh giá con người trong mối quan hệ với gia đình, bạn bè, đồng nghiệp và các mối quan hệ xã hội được gọi là cách nhìn nhận gì?`,o:[`A. Biện chứng`,`B. Toàn diện`,`C. Lịch sử, cụ thể`,`D. Phiến diện`],a:`B`},
{q:`Yếu tố nào không thuộc lực lượng sản xuất?`,o:[`A. Người lao động`,`B. Nhà xưởng, công trường`,`C. Đối tượng lao động`,`D. Kinh tế thượng tầng`],a:`D`},
{q:`Giải quyết mặt thứ nhất trong trong vấn đề cơ bản của triết học đã chia nó thành hai trường phái triết học lớn trong lịch sử, đó là các chủ nghĩa`,o:[`A. Duy vật và duy tâm`,`B. Duy vật và siêu hình`,`C. Duy vật biện chủng và duy tâm`,`D. Duy vật máy móc và duy tâm`],a:`A`},
{q:`Nguồn gốc xã hội dẫn đến sự ra đời của Triết học là?`,o:[`A. Do sự phát triển của lực lượng sản xuất`,`B. Cách mạng nổ ra, những tộc người tan rã`,`C. Lao động trí óc đã tách khỏi lao động chân tay`,`D. Phân tích đúng tình hình trên toàn thế giới, sản xuất phát triển`],a:`C`},
{q:`Theo quan điểm của chủ nghĩa Mác-Lênin,"Bộ lạc" được định nghĩa là gì?`,o:[`A. Là cộng đồng bao gồm những bộ lạc có quan hệ cùng huyết thống hoặc các thị tộc có quan hệ hôn nhân liên kết với nhau`,`B. Là cộng đồng bao gồm những thị tộc có quan hệ hôn nhân liên kết với nhau`,`C. Là cộng đồng bao gồm những thị tộc có quan hệ cùng huyết thống hoặc các thị tộc có quan hệ hôn nhân liên kết với nhau`,`D. Là cộng đồng bao gồm những thị tộc có quan hệ cùng huyết thống`],a:`C`},
{q:`Theo quan điểm của chủ nghĩa duy vật biện chứng, sự vật khi mới ra đời chúng tồn tại dưới dạng.`,o:[`A. Cái đơn nhất`,`B. Cái cụ thể`,`C. Cái chung`],a:`A`},
{q:`Hoạt động sản xuất vật chất cơ sở hình thành nên quan hệ gì? (Kiểu hỏi khác: Đâu là cơ sở hình thành nên quan hệ kinh tế- vật chất giữa người với người?)`,o:[`A. Quan hệ kinh tế giữa người với người`,`B. Quan hệ vật chất giữa người với người`,`C. Quan hệ kinh tế- vật chất giữa người với vật`,`D. Quan hệ kinh tế- vật chất giữa người với người`],a:`D`},
{q:`Đâu là một trong những hình thức cộng đồng người trước khi hình thành dân tộc?`,o:[`A. Thị tộc`,`B. Chủng tộc`,`C. Sắc tộc`,`D. Dân tộc`],a:`A`},
{q:`Khi một sự vật, một hiện tượng mới được nảy sinh thì yếu tố nào sẽ xuất hiện đầu tiên?(NHUNG HOÀNG)`,o:[`A. Cái chung`,`B. Cái riêng`,`C. Cái đơn nhất`,`D. Cái phổ biến`],a:`C`},
{q:`Một trong ba hình thức cơ bản của chủ nghĩa duy vật là gì?`,o:[`A. Chủ nghĩa duy vật chất phác thời cổ đại`,`B. Chủ nghĩa duy vật trung đại`,`C. Chủ nghĩa duy vật Mác thời cận đại`,`D. Chủ nghĩa Sophanh thời hiện đại`],a:`A`},
{q:`Khẳng định nào sau đây về thế giới vật chất là đúng?`,o:[`A. Chỉ có một thế giới duy nhất là thế giới vật chất`,`B. Chỉ có một thế giới duy nhất là thế giới tinh thần`,`C. Có nhiều thế giới vật chất`,`D. Có nhiều thế giới tinh thần`],a:`A`},
{q:`Cái...là cái toàn bộ, phong phú hơn cái...(NHUNG HOÀNG)`,o:[`A. Chung/Riêng.`,`B. Riêng/Chung.`,`C. Chung/Đơn nhất.`,`D. Đơn nhất/Riêng.`],a:`B`},
{q:`Theo quan điểm của chủ nghĩa duy vật biện chứng, luận điểm nào sau đây là đúng? (Kiểu hỏi khác: Theo quan điểm của chủ nghĩa duy vật biện chứng, luận điểm nào sau đây là đúng? A. Nguyên nhân là cái sản sinh ra kết quả...)`,o:[`A. Có tất nhiên thuần tuý tồn tại khách quan`,`B. Có ngẫu nhiên thuần tuý tồn tại khách quan`,`C. Không có cái tất nhiên và ngẫu nhiên thuần tuý tồn tại bên ngoài nhau`,`D. Tất nhiên và ngẫu nhiên cùng tồn tại song song với nhau trong tư duy`],a:`C`},
{q:`Điền vào chỗ trống: Chủ nghĩa duy vật biện chứng đã định nghĩa nhận thức là một quá trình phản ánh... thế giới khách quan vào bộ óc của con người. (Chọn 3 đáp án)`,o:[`A. Tự giác`,`B. Tích cực`,`C. Sáng tạo`,`D. Chủ quan`],a:`ABC`},
{q:`Toàn bộ những quan hệ sản xuất của một xã hội trong sự vận động hiện thực của chúng hợp thành cơ cấu kinh tế của xã hội đó được là gì?`,o:[`A. Cơ sở hạ tầng`,`B. Cơ sở thượng tầng`,`C. Quan hệ sản xuất`,`D. Quan hệ phân phối`],a:`A`},
{q:`Trong hoạt động thực tiễn, sai lầm của sự trì trệ bảo thủ là do không tôn trọng quy luật nào?`,o:[`A. Quy luật mâu thuẫn`,`B. Quy luật lượng chất`,`C. Quy luật tự nhiên`,`D. Quy luật xã hội`],a:`B`},

{q:`Trong các yếu tố của lực lượng sản xuất, yếu tố nào là quan trọng nhất?`,o:[`A. Tư liệu sản xuất`,`B. Người lao động`,`C. Đối tượng lao động`,`D. Máy móc và công nghệ hiện đại`],a:`B`},
{q:`Tiền đề xuất phát chủ nghĩa duy vật lịch sử là gì?`,o:[`A. Con người hiện thực`,`B. Con người trừu tượng`,`C. Con người hành động`,`D. Con người tư duy`],a:`B`},

{q:`Quan điểm phát triển đòi hỏi điều gì?`,o:[`A. Bảo vệ cái mới, ủng hộ cái mỗi, đấu tranh cho cái mới nhưng không phủ định sạch trơn cái cũ`,`B. Bảo vệ cái cũ, đấu tranh cho cái cũ đồng thời tạo điều kiện để cái mới ra đời và thay thế cái cũ`,`C. Phát huy những mặt tích cực của cái cũ, tạo điều kiện cho nó phát triển`,`D. Tạo điều kiện tiền đề cho cái mới phát triển`],a:`A`},
